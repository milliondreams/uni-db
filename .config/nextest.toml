# Workspace nextest configuration.
#
# `slow-timeout`: a test running past `period` is flagged slow; after
# `terminate-after` consecutive periods it is killed and reported as a
# timeout instead of hanging the whole run (CI previously had no backstop).
# Genuinely long tests (soak/stress) are `#[ignore]`d and opt in via
# `--run-ignored`, so a 3-minute ceiling is generous for the default tier.

[profile.default]
slow-timeout = { period = "60s", terminate-after = 3 }

# CI profile: keep running after failures so one broken test surfaces the
# full failure set in a single pipeline run. Select with `--profile ci`.
[profile.ci]
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 3 }

# Soak profile: the nightly "Soak & Stress" job opts the long-running
# `#[ignore]`'d soak/stress tests in via `--run-ignored`. They legitimately run
# for many minutes (cranked knobs: 10k-op stress, 100-fork soak), so the 3-min
# ci ceiling kills them spuriously. Raise the per-test ceiling to 40 minutes
# (period 120s x terminate-after 20); the job's `timeout-minutes` is the real
# backstop. Select with `--profile soak`.
[profile.soak]
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 20 }
