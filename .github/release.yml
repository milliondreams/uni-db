changelog:
  categories:
    - title: "New Features"
      labels: ["feat", "feature", "enhancement"]
    - title: "Bug Fixes"
      labels: ["fix", "bug", "bugfix"]
    - title: "Performance"
      labels: ["perf", "performance"]
    - title: "Documentation"
      labels: ["docs", "documentation"]
    - title: "Internals"
      labels: ["refactor", "chore", "ci", "test"]
    - title: "Other Changes"
      labels: ["*"]
