# Continuous Integration Workflow (push to main)
#
# The thorough remainder of CI, run ONCE on push to main. The cheap PR gates
# (format, clippy, the workspace test suite, openCypher TCK schemaless, and the
# Python ruff + pytest) run on the PR in pr.yml and are deliberately NOT
# repeated here — branch protection ("require branches to be up to date before
# merging") guarantees those gates ran against this exact tree.
#
# What runs here is everything the PR does NOT: the openCypher sidecar mode,
# both Locy TCK lanes, the ONNX reranker suites, cloud integration, the rustdoc
# gate, the flagship-notebook executions, the release-path guards, and the CUDA
# wheel-graph smoke.
#
# The final `gate` job is named "Test" because release.yml's publish guard
# asserts a passing check named "Test" on the tagged commit; keeping that name
# makes this workflow's green the authoritative release signal with no change
# to release.yml.

name: CI

on:
  push:
    branches: [main]

# Serialize main runs (don't cancel — they feed the release gate).
concurrency:
  group: ci-main
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

# Runner targeting is indirected through repository variables so the pool can be
# cut over (and rolled back) without editing this file. The DEFAULT is GitHub-
# hosted: each falls back to its original GitHub-hosted larger-runner label when
# its variable is unset, so this file is a behavioral no-op until you opt in. To
# move a tier onto the self-hosted aks-isolated-linux pool, set the variable to
# the self-hosted label (shown in parens) in Settings > Secrets and variables >
# Actions > Variables; to roll back, clear the variable.
#   CI_RUNNER_XLARGE64  default linux-xlarge-64  → set to linux-64core  — tck-full, reranker
#   CI_RUNNER_XLARGE32  default linux-xlarge-32  → set to linux-32core  — notebooks, release-guards
#   CI_RUNNER_XLARGE    default ubuntu-latest    → set to linux-xlarge  — docs, wheels-cuda-smoke
# The `cloud` job is deliberately NOT indirected: it is hardcoded to the GitHub-
# hosted linux-xlarge-32 so its LocalStack S3 tests always run on GitHub infra,
# even after the self-hosted cutover. The `gate` job likewise stays pinned to
# ubuntu-latest: it is the authoritative release check and should run on GitHub's
# infra regardless of the self-hosted pool's health.
# Canary order: flip XLARGE first (cheap, no secrets/Docker), then XLARGE32, then XLARGE64.
jobs:
  # Conformance modes the PR does not run: openCypher sidecar + both Locy lanes.
  # This job is the cache "saver" for main's shared "ci" cache (no save-if:false).
  tck-full:
    if: github.repository == 'rustic-ai/uni-db'
    name: TCK (sidecar + Locy)
    runs-on: ${{ vars.CI_RUNNER_XLARGE64 || 'linux-xlarge-64' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Run openCypher TCK (sidecar schema)
        run: UNI_TCK_SCHEMA_MODE=sidecar cargo nextest run -p uni-tck --test tck

      - name: Run Locy TCK (schemaless + schema)
        run: |
          cargo nextest run -p uni-locy-tck --test locy_tck
          UNI_LOCY_TCK_SCHEMA_MODE=sidecar cargo nextest run -p uni-locy-tck --test locy_tck

  # ONNX reranker integration — both linking modes (compiles uni-db with the
  # opt-in provider-onnx features, so it reads but does not save the base cache).
  reranker:
    if: github.repository == 'rustic-ai/uni-db'
    name: Reranker Integration (ONNX)
    runs-on: ${{ vars.CI_RUNNER_XLARGE64 || 'linux-xlarge-64' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      # Provider-onnx is opt-in (not in default features). The two ONNX
      # linking modes are mutually exclusive at compile time, so we test
      # them in separate steps.
      - name: Run reranker integration tests (bundled CPU ONNX)
        # `provider-onnx` statically links pyke's CPU libonnxruntime.a — no
        # ORT_DYLIB_PATH needed; the E2E `#[ignore]` real-ONNX tests run
        # because the lib is in the binary.
        #
        # `test_real_onnx_cross_encoder_reranks_by_relevance` is filtered out:
        # `cross-encoder/ms-marco-MiniLM-L6-v2/onnx/model.onnx` is served only
        # via a 302 to `cas-bridge.xethub.hf.co` (xet-bridge LFS). `hf-hub
        # 0.5.0`'s `relative_redirect_client` refuses absolute redirects, so
        # the download 404s. The other 3 real-ONNX tests still run.
        run: |
          cargo nextest run -p uni-db --features provider-onnx --test reranker_integration --run-ignored all \
            -E 'not test(=test_real_onnx_cross_encoder_reranks_by_relevance)'

      - name: Run reranker integration tests (load-dynamic ONNX)
        # `provider-onnx-dynamic` requires an ONNX Runtime tarball at runtime.
        # `--no-default-features` is required: defaults include `provider-onnx`
        # (bundled), and the two ONNX modes are mutually exclusive at the `ort`
        # crate level.
        run: |
          curl -sSL -o /tmp/ort.tgz https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz
          tar xzf /tmp/ort.tgz -C /tmp
          export ORT_DYLIB_PATH=/tmp/onnxruntime-linux-x64-1.20.1/lib/libonnxruntime.so
          cargo nextest run -p uni-db --no-default-features --features provider-onnx-dynamic --test reranker_integration

  # Cloud storage integration tests with LocalStack.
  cloud:
    if: github.repository == 'rustic-ai/uni-db'
    name: Cloud Integration Tests
    # Pinned to a GitHub-hosted runner (NOT the CI_RUNNER_* indirection): the
    # LocalStack S3 integration must run on GitHub infra regardless of the
    # self-hosted cutover, so setting CI_RUNNER_XLARGE32 to a self-hosted label
    # never moves this job.
    runs-on: linux-xlarge-32
    services:
      localstack:
        image: localstack/localstack:4.13.1
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Wait for LocalStack
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; do echo "Waiting for LocalStack..."; sleep 2; done'
          echo "LocalStack is ready!"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run cloud integration tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ALLOW_HTTP: true
        run: |
          # These suites were consolidated into each crate's single `integration`
          # binary; filter to the original module by name.
          cargo nextest run -p uni-store --test integration --run-ignored all \
            -E 'test(/^cloud_integration_test::/)'
          cargo nextest run -p uni-db --test integration --run-ignored all \
            -E 'test(/^hybrid_localstack_e2e::/)'

  # rustdoc gate + generated-notebook freshness check.
  docs:
    if: github.repository == 'rustic-ai/uni-db'
    name: Documentation
    runs-on: ${{ vars.CI_RUNNER_XLARGE || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify generated Locy notebooks
        run: |
          python3 website/scripts/generate_locy_notebooks.py --check
          python3 website/scripts/generate_semiconductor_flagship_notebook.py --check
          python3 website/scripts/generate_pharma_flagship_notebook.py --check
          python3 website/scripts/generate_cyber_flagship_notebook.py --check

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      # All wheel-matrix variant crates share the same `[lib].name = "_uni_db"`,
      # which cargo doc rejects as an output-filename collision; they reuse
      # `bindings/uni-db/src/lib.rs` so excluding them loses no doc content.
      - name: Build documentation
        run: |
          cargo doc --no-deps --workspace \
            --exclude uni-python \
            --exclude uni-tck \
            --exclude uni-python-onnx \
            --exclude uni-python-cuda \
            --exclude uni-python-metal \
            --exclude uni-python-onnx-cuda \
            --exclude uni-python-onnx-metal
        env:
          RUSTDOCFLAGS: -D warnings

  # Flagship Locy notebook executions (heavier than the PR Python tests; built
  # from a release wheel and run serially-stable under the runtime guard).
  notebooks:
    if: github.repository == 'rustic-ai/uni-db'
    name: Flagship Notebooks
    runs-on: ${{ vars.CI_RUNNER_XLARGE32 || 'linux-xlarge-32' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Install Python dependencies (uni-db)
        working-directory: bindings/uni-db
        # `notebook-runtime` extra (numpy / pyarrow / onnxruntime) is required
        # by the flagship Locy notebook verifiers below.
        run: uv sync --group dev --extra notebook-runtime

      - name: Build Python wheel (uni-db)
        working-directory: bindings/uni-db
        run: uv run maturin build --out dist

      - name: Install built wheel (uni-db)
        working-directory: bindings/uni-db
        run: uv pip install --force-reinstall dist/*.whl

      - name: Execute flagship Locy notebook (semiconductor)
        run: uv run --project bindings/uni-db python website/scripts/verify_semiconductor_flagship_notebook.py

      - name: Execute flagship Locy notebook (pharma batch genealogy)
        run: uv run --project bindings/uni-db python website/scripts/verify_pharma_flagship_notebook.py

      - name: Execute flagship Locy notebook (cyber exposure twin)
        run: uv run --project bindings/uni-db python website/scripts/verify_cyber_flagship_notebook.py

      - name: Execute flagship Locy notebook (predictive maintenance)
        run: uv run --project bindings/uni-db python website/scripts/verify_predictive_maintenance_flagship_notebook.py

      - name: Execute flagship Locy notebook (adverse drug reaction)
        run: uv run --project bindings/uni-db python website/scripts/verify_adverse_drug_reaction_flagship_notebook.py

      - name: Execute flagship Locy notebook (drug-drug interaction)
        run: uv run --project bindings/uni-db python website/scripts/verify_drug_drug_interaction_flagship_notebook.py

  # Release-path guards. Feature drift (a wheel variant missing a plugin feature)
  # and an incomplete crates.io publish list slip through the workspace build and
  # only fail at release time; these reproduce both failure modes cheaply.
  release-guards:
    if: github.repository == 'rustic-ai/uni-db'
    name: Release Guards
    runs-on: ${{ vars.CI_RUNNER_XLARGE32 || 'linux-xlarge-32' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Static check (no compile): every wheel variant must enable the plugin
      # loader features its shared binding source calls unconditionally.
      - name: Check wheel-variant plugin features
        run: python3 scripts/ci/check_wheel_variant_features.py

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      # The crates.io publish list must be uni-db's full publishable
      # dependency closure in topological order (uses `cargo metadata`).
      - name: Check crates.io publish list
        run: python3 scripts/ci/check_publish_list.py

      # Compile guard for the slim `default-features = false` wheel path, built
      # in ISOLATION (no --workspace) so feature unification can't mask a missing
      # plugin feature.
      - name: Compile-check slim ONNX wheel variant
        run: cargo check -p uni-python-onnx

  # CUDA wheel-graph smoke — catches Cargo-dep-graph breakage in the
  # `uni-db-cuda` variant early. `cargo metadata` resolves features without
  # running build scripts (no nvcc / CUDA toolkit needed). Real CUDA wheel
  # builds run in `release-wheels.yml` on tag-push.
  wheels-cuda-smoke:
    if: github.repository == 'rustic-ai/uni-db'
    name: Wheel-graph smoke check (uni-db-cuda)
    runs-on: ${{ vars.CI_RUNNER_XLARGE || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Cargo metadata for uni-db-cuda
        run: |
          cargo metadata --format-version=1 \
            --manifest-path bindings/uni-db-cuda/Cargo.toml \
            > /dev/null

  # Aggregator gate. release.yml's publish guard asserts a passing check-run
  # named exactly "Test" on the tagged commit (gh api … select(.name == "Test")).
  # Keep this literal name so release.yml is unchanged; it succeeds only if every
  # thorough job above passed, making it the authoritative release signal.
  gate:
    if: github.repository == 'rustic-ai/uni-db'
    name: Test
    needs: [tck-full, reranker, cloud, docs, notebooks, release-guards, wheels-cuda-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Thorough CI passed
        run: echo "All push-to-main CI jobs passed."
