# Continuous Integration Workflow
#
# Runs comprehensive tests, lints, cloud integration, and documentation builds.
# Only runs on main branch pushes to avoid duplicate runs with PR workflow.
#
# Optimization: The test job runs first to build and cache all Rust dependencies.
# Other jobs (cloud-tests, python-tests, docs) run in parallel after test completes,
# reusing the cached dependencies for faster execution.

name: CI

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # Basic tests and lints
  # Uses xlarge runner for faster builds (8 cores, 32GB RAM)
  test:
    name: Test
    runs-on: linux-xlarge-64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --exclude uni-tck --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace --exclude uni-tck

      - name: Run TCK (schemaless + schema)
        run: |
          cargo nextest run -p uni-tck --test tck
          UNI_TCK_SCHEMA_MODE=sidecar cargo nextest run -p uni-tck --test tck

  # Cloud storage integration tests with LocalStack
  # Runs after test job to reuse cached dependencies
  cloud-tests:
    name: Cloud Integration Tests
    needs: test
    runs-on: linux-xlarge-32
    services:
      localstack:
        image: localstack/localstack:4.13.1
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Wait for LocalStack
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; do echo "Waiting for LocalStack..."; sleep 2; done'
          echo "LocalStack is ready!"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run cloud integration tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ALLOW_HTTP: true
        run: |
          cargo nextest run --test cloud_integration_test --run-ignored all
          cargo nextest run -p uni-db --test hybrid_localstack_e2e --run-ignored all

  # Python bindings tests
  # Runs in parallel with test job (builds its own Rust extension via maturin)
  python-tests:
    name: Python Tests
    runs-on: linux-xlarge-32
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Install Python dependencies (uni-db)
        working-directory: bindings/uni-db
        run: uv sync --group dev

      - name: Build Python wheel (uni-db)
        working-directory: bindings/uni-db
        run: uv run maturin build --out dist

      - name: Install built wheel (uni-db)
        working-directory: bindings/uni-db
        run: uv pip install --force-reinstall dist/*.whl

      - name: Execute flagship Locy notebook (semiconductor)
        run: uv run --project bindings/uni-db python website/scripts/verify_semiconductor_flagship_notebook.py

      - name: Execute flagship Locy notebook (pharma batch genealogy)
        run: uv run --project bindings/uni-db python website/scripts/verify_pharma_flagship_notebook.py

      - name: Execute flagship Locy notebook (cyber exposure twin)
        run: uv run --project bindings/uni-db python website/scripts/verify_cyber_flagship_notebook.py

      - name: Check Python formatting (uni-db)
        working-directory: bindings/uni-db
        run: uv run ruff format --check .

      - name: Lint Python code (uni-db)
        working-directory: bindings/uni-db
        run: uv run ruff check .

      - name: Run Python tests (uni-db)
        working-directory: bindings/uni-db
        run: uv run pytest tests/ -v -n auto

      - name: Install Python dependencies (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv sync --group dev

      - name: Check Python formatting (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run ruff format --check .

      - name: Lint Python code (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run ruff check .

      - name: Run Python tests (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run pytest tests/ -v -n auto

  # Build documentation and check examples
  # Runs after test job to reuse cached dependencies
  docs:
    name: Documentation
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify generated Locy notebooks
        run: |
          python3 website/scripts/generate_locy_notebooks.py --check
          python3 website/scripts/generate_semiconductor_flagship_notebook.py --check
          python3 website/scripts/generate_pharma_flagship_notebook.py --check
          python3 website/scripts/generate_cyber_flagship_notebook.py --check

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Build documentation
        run: cargo doc --no-deps --workspace --exclude uni-python --exclude uni-tck
        env:
          RUSTDOCFLAGS: -D warnings
