name: Nightly

# Nightly hardening lane (architecture review §6): the test tiers too slow
# or too specialized for PR/main pipelines.
#   - soak:  the #[ignore]'d long-running stress/soak tier, with the soak
#            knobs cranked to their documented nightly settings.
#   - cloud: LocalStack S3 integration (also on main-push CI; here for the
#            longer --run-ignored variants on a schedule).
#   - fuzz:  cargo-fuzz over the parser/codec attack surfaces.
#   - bench: criterion benches with results uploaded as artifacts for
#            manual trend comparison (no external regression service).
#
# No untrusted input is interpolated into run commands (cron +
# workflow_dispatch only).

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  soak:
    name: Soak & Stress (run-ignored)
    runs-on: ubuntu-xlarge
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Build WASM plugin fixtures
        run: ./scripts/build-wasm-fixtures.sh

      - name: Run ignored soak/stress tier
        env:
          # Soak knobs calibrated to complete reliably within the job budget
          # (fork_writes_soak ~5 min; see fork_writes_soak.rs). The prior
          # 100/1000/10 ran well over 40 min and was killed by the per-test
          # timeout, so the soak never actually completed.
          UNI_FORK_SOAK_FORKS: 40
          UNI_FORK_SOAK_MUTATIONS: 300
          UNI_FORK_SOAK_RESTARTS: 4
          # Number of generated programs the Locy naive-oracle soak diffs against
          # the engine. ~10k completes in ~10-15 min (each case pays a full DB
          # build, which dominates); higher would risk the soak per-test kill
          # window. Dedicated var so it can't perturb other crates' PROPTEST_CASES.
          ORACLE_SOAK_CASES: 10000
        run: |
          # Scope to the actual soak/stress tests. `--run-ignored ignored-only`
          # alone also sweeps in unrelated #[ignore]'d tests (autoembed model
          # downloads needing HF auth, LocalStack e2e) that this job does not
          # provision — LocalStack has its own `cloud` job below.
          cargo nextest run --profile soak -p uni-db -p uni-store -p uni-locy-oracle \
            --run-ignored ignored-only \
            -E 'test(/soak/) | test(/stress/)'

  cloud:
    name: Cloud Integration (LocalStack)
    runs-on: linux-xlarge-32
    timeout-minutes: 60
    services:
      localstack:
        image: localstack/localstack:4.13.1
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Wait for LocalStack
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; do echo "Waiting for LocalStack..."; sleep 2; done'
          echo "LocalStack is ready!"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run cloud integration tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ALLOW_HTTP: true
        run: |
          cargo nextest run -p uni-store --test integration --run-ignored all \
            -E 'test(/^cloud_integration_test::/)'
          cargo nextest run -p uni-db --test integration --run-ignored all \
            -E 'test(/^hybrid_localstack_e2e::/)'

  fuzz:
    name: Fuzz (parsers & codecs)
    runs-on: ubuntu-xlarge
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (nightly, for libfuzzer)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-fuzz
        # Use the explicit `tool:` form, not the `@cargo-fuzz` shorthand: the
        # shorthand can resolve to a version ref that drops the implicit tool
        # selection (install-action warns "no tool specified"), leaving
        # `cargo fuzz` uninstalled -> "no such command: fuzz".
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Cache fuzz build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "fuzz"
          workspaces: fuzz
          cache-on-failure: true

      - name: Run fuzz targets (5 min each)
        working-directory: fuzz
        run: |
          for target in cypher_parse locy_parse wal_decode btic_decode; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=300 -timeout=10
            echo "::endgroup::"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

  bench:
    name: Benchmarks (artifact upload)
    runs-on: ubuntu-xlarge
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Run commit/SSI benches
        run: |
          cargo bench -p uni-db --bench ssi_commit_overhead
          cargo bench -p uni-db --bench concurrent_mutations
          cargo bench -p uni-db --bench commit_throughput

      - name: Upload criterion results
        uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ github.run_id }}
          path: target/criterion/
          if-no-files-found: warn
