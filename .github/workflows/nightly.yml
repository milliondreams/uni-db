name: Nightly

# Nightly hardening lane (architecture review §6): the test tiers too slow
# or too specialized for PR/main pipelines.
#   - soak:  the #[ignore]'d long-running stress/soak tier, with the soak
#            knobs cranked to their documented nightly settings.
#   - cloud: LocalStack S3 integration (also on main-push CI; here for the
#            longer --run-ignored variants on a schedule).
#   - fuzz:  cargo-fuzz over the parser/codec attack surfaces.
#   - bench: criterion benches with results uploaded as artifacts for
#            manual trend comparison (no external regression service).
#
# No untrusted input is interpolated into run commands (cron +
# workflow_dispatch only).

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Least-privilege GITHUB_TOKEN: every job here only reads the repo, runs tests,
# and uploads artifacts (the artifact API does not use the contents scope), so
# read-only contents is sufficient. Mirrors ci.yml / pr.yml.
permissions:
  contents: read

# Runner targeting is indirected through the SAME repository variables as ci.yml
# so the self-hosted pool can be cut over (and rolled back) for CI and Nightly
# together, without editing either file. Each falls back to the self-hosted
# aks-isolated-linux runner label (by core count) when its variable is unset, so
# this file targets the self-hosted pool by default; set the variables in Settings
# > Secrets and variables > Actions > Variables only to override:
#   CI_RUNNER_XLARGE64 (default linux-64core)  — soak, fuzz, model-check,
#                                                 metamorphic, tsan, bench
#   CI_RUNNER_XLARGE32 (default linux-32core)  — cloud (LocalStack, matches ci.yml)
# Set a single unique runner label string to redirect a tier; to roll back, clear
# the variable. Both fallbacks now match ci.yml exactly (linux-64core /
# linux-32core), since the CI_RUNNER_* variables are shared across the two files.
jobs:
  soak:
    if: github.repository == 'rustic-ai/uni-db'
    name: Soak & Stress (run-ignored)
    runs-on: ${{ vars.CI_RUNNER_XLARGE64 || 'linux-64core' }}
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Build WASM plugin fixtures
        run: ./scripts/build-wasm-fixtures.sh

      - name: Run ignored soak/stress tier
        env:
          # Soak knobs calibrated to complete reliably within the job budget
          # (fork_writes_soak ~5 min; see fork_writes_soak.rs). The prior
          # 100/1000/10 ran well over 40 min and was killed by the per-test
          # timeout, so the soak never actually completed.
          UNI_FORK_SOAK_FORKS: 40
          UNI_FORK_SOAK_MUTATIONS: 300
          UNI_FORK_SOAK_RESTARTS: 4
          # Number of generated programs the Locy naive-oracle soak diffs against
          # the engine. ~10k completes in ~10-15 min (each case pays a full DB
          # build, which dominates); higher would risk the soak per-test kill
          # window. Dedicated var so it can't perturb other crates' PROPTEST_CASES.
          ORACLE_SOAK_CASES: 10000
        run: |
          # Scope to the actual soak/stress tests. `--run-ignored ignored-only`
          # alone also sweeps in unrelated #[ignore]'d tests (autoembed model
          # downloads needing HF auth, LocalStack e2e) that this job does not
          # provision — LocalStack has its own `cloud` job below.
          cargo nextest run --profile soak -p uni-db -p uni-store -p uni-locy-oracle \
            --run-ignored ignored-only \
            -E 'test(/soak/) | test(/stress/)'

  cloud:
    if: github.repository == 'rustic-ai/uni-db'
    name: Cloud Integration (LocalStack)
    runs-on: ${{ vars.CI_RUNNER_XLARGE32 || 'linux-32core' }}
    timeout-minutes: 60
    services:
      localstack:
        image: localstack/localstack:4.13.1
        ports:
          - 4566:4566
        env:
          SERVICES: s3
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Wait for LocalStack
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; do echo "Waiting for LocalStack..."; sleep 2; done'
          echo "LocalStack is ready!"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run cloud integration tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ALLOW_HTTP: true
        run: |
          cargo nextest run -p uni-store --test integration --run-ignored all \
            -E 'test(/^cloud_integration_test::/)'
          cargo nextest run -p uni-db --test integration --run-ignored all \
            -E 'test(/^hybrid_localstack_e2e::/)'

  fuzz:
    if: github.repository == 'rustic-ai/uni-db'
    name: Fuzz (parsers & codecs)
    runs-on: ${{ vars.CI_RUNNER_XLARGE64 || 'linux-64core' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (nightly, for libfuzzer)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-fuzz
        # Use the explicit `tool:` form, not the `@cargo-fuzz` shorthand: the
        # shorthand can resolve to a version ref that drops the implicit tool
        # selection (install-action warns "no tool specified"), leaving
        # `cargo fuzz` uninstalled -> "no such command: fuzz".
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Cache fuzz build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "fuzz"
          workspaces: fuzz
          cache-on-failure: true

      - name: Run fuzz targets (5 min each)
        working-directory: fuzz
        # `--target x86_64-unknown-linux-gnu` is load-bearing: cargo-binstall
        # now resolves the *musl*-built `cargo-fuzz` prebuilt, and cargo-fuzz
        # defaults `--target` to the triple it was itself compiled for. A musl
        # default makes the build statically link libc, which AddressSanitizer
        # rejects ("sanitizer is incompatible with statically linked libc") and
        # which has no sanitizer-ready prebuilt std ("can't find crate for
        # core"). Pin the runner's native gnu target (dynamic libc + prebuilt
        # instrumentable std) so the default never leaks in.
        run: |
          for target in cypher_parse locy_parse wal_decode btic_decode; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run --target x86_64-unknown-linux-gnu "$target" -- -max_total_time=300 -timeout=10
            echo "::endgroup::"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore

  model-check:
    if: github.repository == 'rustic-ai/uni-db'
    name: Concurrency Model Check (loom + shuttle)
    runs-on: ${{ vars.CI_RUNNER_XLARGE64 || 'linux-64core' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      # Exhaustively model-checks the OCC commit core (write-write + read-write
      # conflict detection in crates/uni-store/src/runtime/occ.rs) over all
      # 2- and 3-committer interleavings. See src/occ_loom_model.rs. Must run
      # ONLY --test occ_model: other suites drive real Writers, whose loom
      # atomics panic outside a model.
      - name: loom (exhaustive, 2 & 3 committers)
        env:
          LOOM_MAX_PREEMPTIONS: 3
        run: cargo nextest run -p uni-store --features loom --test occ_model

      # Randomized scheduler over the same models — scales past loom's
      # exhaustive limit (10k iterations/model; reproducible by seed on failure).
      - name: shuttle (randomized)
        run: cargo nextest run -p uni-store --features shuttle --test occ_model

  metamorphic:
    if: github.repository == 'rustic-ai/uni-db'
    name: Metamorphic Query Oracles (TLP + NoREC)
    runs-on: ${{ vars.CI_RUNNER_XLARGE64 || 'linux-64core' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      # High-volume soak of the TLP + NoREC + structural query-correctness
      # oracles (crates/uni/tests/common/metamorphic/). Each soak test builds the
      # seed db ONCE and shares it read-only across all cases (see
      # metamorphic::drive), so per-case cost is just a few sub-millisecond reads.
      #
      # Budget sizing: the four soak tests run concurrently (wall-clock = slowest).
      # The heaviest is `structural` at ~7 queries/case; at 50k cases it runs
      # ~25 min, comfortably inside the soak profile's 40-min per-test kill
      # (.config/nextest.toml: 120s × terminate-after 20) with margin for CI
      # variance. 50k cases × (4+4+2+7) queries ≈ 850k metamorphic queries/night,
      # ~8.5× the Phase-1 exit target of ≥100k queries/night. The smoke tier runs
      # per-PR (pr.yml metamorphic-smoke); only the #[ignore]'d soaks run here.
      - name: Metamorphic soak (TLP + NoREC + structural)
        env:
          METAMORPHIC_CASES: 50000
        run: |
          cargo nextest run --profile soak -p uni-db --test integration \
            --run-ignored ignored-only -E 'test(/metamorphic::/) and test(soak)'

  tsan:
    if: github.repository == 'rustic-ai/uni-db'
    name: ThreadSanitizer (SSI commit path)
    runs-on: ${{ vars.CI_RUNNER_XLARGE64 || 'linux-64core' }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # build-std needs the nightly toolchain + rust-src to recompile std with
      # the sanitizer instrumentation.
      - name: Setup Rust (nightly + rust-src, for -Zbuild-std)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "tsan"
          cache-on-failure: true

      # Run the genuinely multi-threaded SSI suites (real tokio worker threads +
      # tokio::spawn) under ThreadSanitizer — the live async commit path the
      # loom/shuttle models (model-check job) structurally cannot reach. std is
      # rebuilt instrumented via -Zbuild-std so cross-thread sync inside std/tokio
      # is visible. The single-threaded ssi_occ_test (uni-store) is deliberately
      # excluded: no parallelism → no races to find.
      #
      # halt_on_error=0 collects every report into tsan.log (uploaded for triage);
      # exitcode=66 still fails the job on any non-suppressed race, so the lane
      # keeps teeth. Suppressions are scoped to known-benign FFI/parking_lot
      # frames only — never our own crates.
      # --test-threads 1 runs the test PROCESSES serially. Each SSI test already
      # spins its own multi-thread tokio runtime (8 workers) + spawned writers,
      # so TSan still sees full in-process cross-thread interleavings — serial
      # execution costs zero race coverage. Running two instrumented heavy
      # processes at once instead thrashes under TSan's 5-10x memory/CPU overhead
      # and stalls the MERGE retry-storm test past nextest's 180s ceiling. Serial
      # keeps every test ~1-4s, well inside the default slow-timeout.
      - name: ThreadSanitizer on the SSI suite
        env:
          RUSTC_WRAPPER: ""
          RUSTFLAGS: "-Zsanitizer=thread"
          PROPTEST_CASES: "16"
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/.config/tsan-suppressions.txt:halt_on_error=0:exitcode=66:second_deadlock_stack=1:history_size=4"
        run: |
          cargo +nightly nextest run -Z build-std \
            --target x86_64-unknown-linux-gnu \
            -p uni-db --test integration \
            --test-threads 1 \
            -E 'test(/ssi_invariants::/) | test(/ssi_occ_e2e::/) | test(/ssi_stress::/)' \
            2>&1 | tee tsan.log

      # The log IS the triage input for tightening .config/tsan-suppressions.txt.
      - name: Upload ThreadSanitizer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tsan-log
          path: tsan.log
          if-no-files-found: warn

  bench:
    if: github.repository == 'rustic-ai/uni-db'
    name: Benchmarks (artifact upload)
    runs-on: ${{ vars.CI_RUNNER_XLARGE64 || 'linux-64core' }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Run commit/SSI benches
        run: |
          cargo bench -p uni-db --bench ssi_commit_overhead
          cargo bench -p uni-db --bench concurrent_mutations
          cargo bench -p uni-db --bench commit_throughput

      - name: Upload criterion results
        uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ github.run_id }}
          path: target/criterion/
          if-no-files-found: warn
