# Pull Request Workflow
#
# Cheap, fast verification for pull requests — the gates a contributor must
# pass before merge: format, lint, the workspace test suite, one representative
# openCypher TCK lane, and the Python binding tests.
#
# The thorough/expensive remainder (sidecar + Locy TCK, reranker, cloud,
# cargo doc, flagship notebooks, release guards, cuda smoke) runs ONCE on push
# to main in ci.yml and is deliberately NOT repeated here. This is safe because
# branch protection requires PR branches to be up to date with main before
# merging, so these gates run against the exact tree that will land on main.

name: PR Checks

on:
  pull_request:
    branches: [main]

# Cancel superseded runs when a PR branch is pushed again.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # Format and lint checks
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Wheel-matrix accelerator variants don't fit on the regular CI
      # runner: metal variants pull in `objc2` (Apple-only); cuda variants
      # pull in `cudarc` whose build.rs requires `nvcc`. They're built in
      # dedicated `release-wheels.yml` jobs with the right container/runner.
      - name: Run clippy
        run: |
          cargo clippy --workspace \
            --exclude uni-tck \
            --exclude uni-python-cuda \
            --exclude uni-python-metal \
            --exclude uni-python-onnx-cuda \
            --exclude uni-python-onnx-metal \
            --all-targets -- -D warnings

  # Rust tests — the workspace suite (the core signal contributors gate on).
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-xlarge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32-wasip2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      # The uni-plugin-extism / uni-plugin-wasm e2e tests load pre-built
      # WASM plugin artifacts (see scripts/build-wasm-fixtures.sh); build
      # them before the workspace test run or those tests panic.
      - name: Build WASM plugin fixtures
        run: ./scripts/build-wasm-fixtures.sh

      - name: Run tests
        # `uni-python` (bindings/uni-db) and `uni-python-onnx` are
        # cdylib-only crates with zero Rust `#[test]` items — their tests
        # are pytest in the python-tests job. We exclude them from the
        # workspace cargo test because their `pyo3/extension-module` feature
        # unifies with `uni-plugin-pyo3`'s test binaries and breaks the
        # linker (no libpython linkage in extension-module mode).
        run: |
          cargo nextest run --workspace \
            --exclude uni-tck \
            --exclude uni-python \
            --exclude uni-python-onnx \
            --exclude uni-python-cuda \
            --exclude uni-python-metal \
            --exclude uni-python-onnx-cuda \
            --exclude uni-python-onnx-metal

  # openCypher conformance on PRs — the schemaless lane only (the fast,
  # representative mode). The sidecar mode and the Locy TCK lanes run on the
  # main-push CI (ci.yml). Without this, a PR breaking Cypher conformance lands
  # green and only fails post-merge.
  tck:
    name: openCypher TCK (schemaless)
    runs-on: ubuntu-xlarge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true
          save-if: false

      - name: Run openCypher TCK (schemaless)
        run: cargo nextest run -p uni-tck --test tck

  # Python bindings tests — ruff + pytest for both bindings (high-signal,
  # shifted left onto the PR). The 6 flagship-notebook executions are heavier
  # and run on the main-push CI (ci.yml), not here.
  python-tests:
    name: Python Tests
    runs-on: ubuntu-xlarge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Install Python dependencies (uni-db)
        working-directory: bindings/uni-db
        run: uv sync --group dev

      - name: Build Python bindings (uni-db)
        working-directory: bindings/uni-db
        run: uv run maturin develop

      - name: Check Python formatting (uni-db)
        working-directory: bindings/uni-db
        run: uv run ruff format --check .

      - name: Lint Python code (uni-db)
        working-directory: bindings/uni-db
        run: uv run ruff check .

      - name: Run Python tests (uni-db)
        working-directory: bindings/uni-db
        run: uv run pytest tests/ -v -n auto

      - name: Install Python dependencies (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv sync --group dev

      - name: Check Python formatting (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run ruff format --check .

      - name: Lint Python code (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run ruff check .

      - name: Run Python tests (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run pytest tests/ -v -n auto
