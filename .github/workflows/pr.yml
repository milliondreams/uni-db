# Pull Request Workflow
#
# Runs essential tests and checks for pull requests.
# Focused on fast feedback - only runs Rust and Python tests.

name: PR Checks

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # Format and lint checks
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify generated Locy notebooks
        run: |
          python3 website/scripts/generate_locy_notebooks.py --check
          python3 website/scripts/generate_semiconductor_flagship_notebook.py --check
          python3 website/scripts/generate_pharma_flagship_notebook.py --check
          python3 website/scripts/generate_cyber_flagship_notebook.py --check

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Wheel-matrix metal variants don't compile on Linux (gpu-coreml /
      # gpu-metal pull in objc2 which is Apple-only). Skip them in
      # `--workspace` operations; they're built on macOS runners via
      # `release-wheels.yml`.
      - name: Run clippy
        run: |
          cargo clippy --workspace \
            --exclude uni-tck \
            --exclude uni-python-onnx-metal \
            --exclude uni-python-fastembed-metal \
            --exclude uni-python-mistralrs-metal \
            --exclude uni-python-all-metal \
            --all-targets -- -D warnings

  # Rust tests
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-xlarge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Run tests
        run: |
          cargo nextest run --workspace \
            --exclude uni-tck \
            --exclude uni-python-onnx-metal \
            --exclude uni-python-fastembed-metal \
            --exclude uni-python-mistralrs-metal \
            --exclude uni-python-all-metal

  # Python bindings tests
  python-tests:
    name: Python Tests
    runs-on: ubuntu-xlarge
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Install Python dependencies (uni-db)
        working-directory: bindings/uni-db
        run: uv sync --group dev

      - name: Build Python bindings (uni-db)
        working-directory: bindings/uni-db
        run: uv run maturin develop

      - name: Execute flagship Locy notebook (semiconductor)
        run: uv run --project bindings/uni-db python website/scripts/verify_semiconductor_flagship_notebook.py

      - name: Execute flagship Locy notebook (pharma batch genealogy)
        run: uv run --project bindings/uni-db python website/scripts/verify_pharma_flagship_notebook.py

      - name: Execute flagship Locy notebook (cyber exposure twin)
        run: uv run --project bindings/uni-db python website/scripts/verify_cyber_flagship_notebook.py

      - name: Check Python formatting (uni-db)
        working-directory: bindings/uni-db
        run: uv run ruff format --check .

      - name: Lint Python code (uni-db)
        working-directory: bindings/uni-db
        run: uv run ruff check .

      - name: Run Python tests (uni-db)
        working-directory: bindings/uni-db
        run: uv run pytest tests/ -v -n auto

      - name: Install Python dependencies (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv sync --group dev

      - name: Check Python formatting (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run ruff format --check .

      - name: Lint Python code (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run ruff check .

      - name: Run Python tests (uni-pydantic)
        working-directory: bindings/uni-pydantic
        run: uv run pytest tests/ -v -n auto

  # CUDA wheel smoke build — catches feature-flag breakage in the
  # `uni-db-fastembed-cuda` variant early, without paying for the full
  # 13-wheel release matrix on every PR. `cargo check --release` validates
  # the entire dependency graph compiles (including pyke's
  # `ort/download-binaries` fetch) but skips the linker/maturin packaging
  # step, which keeps CI time reasonable. Real wheel builds happen in
  # `release-wheels.yml` on tag/dispatch.
  wheels-fastembed-cuda-smoke:
    name: Wheel smoke build (uni-db-fastembed-cuda)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"
          cache-on-failure: true

      - name: Cargo check (uni-db-fastembed-cuda)
        run: cargo check --release --manifest-path bindings/uni-db-fastembed-cuda/Cargo.toml
