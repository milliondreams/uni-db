name: Build and Publish Wheels

# Owns the entire Python side of a release: the uni-db wheel matrix AND the
# uni-pydantic build/publish.
#
# Builds and publishes 6 wheels mirroring uni-xervo 0.9.0's three-axis
# capability model (provider × linking × acceleration). See
# `docs/migrations/0.9.0-wheel-matrix-collapse.md` for the design.
#
#   - CPU (default):  uni-db, uni-db-onnx
#   - CUDA:           uni-db-cuda, uni-db-onnx-cuda
#   - Apple GPU/ANE:  uni-db-metal, uni-db-onnx-metal
#
# `uni-db` and `uni-db-{cuda,metal}` bundle all 11 providers (candle,
# mistralrs, ONNX local + 8 remote APIs). The `*-onnx*` variants are slim:
# ONNX local + 8 remote APIs only, no candle/mistralrs.
#
# uni-pydantic depends on the uni-db *wheel* (not the crate), so it lives here
# rather than in `release.yml`: its `build-pydantic` job `needs:` the wheel
# publish job, an in-workflow dependency that guarantees the uni-db wheel is on
# the index before pydantic builds/installs against it. (Previously it lived in
# `release.yml` and polled PyPI across workflows, which raced the wheel build.)
#
# Runs in parallel with `release.yml`, which owns validation, tag, GitHub
# release, and the crates.io publish.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0). Required for manual dispatch.'
        required: true
        type: string
      dry_run:
        description: 'Build and validate without publishing'
        type: boolean
        default: false
      target:
        description: 'Publish target (ignored for dry_run). "none" builds wheels and attaches them to the GitHub Release without publishing to any index.'
        type: choice
        options: [none, testpypi, pypi]
        default: none
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      publish_target: ${{ steps.resolve-target.outputs.publish_target }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check version consistency across all wheel-matrix pyprojects
        env:
          VERSION: ${{ steps.set-version.outputs.version }}
        run: |
          set -euo pipefail

          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Input version ($VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          # The six maturin wheel pyprojects single-source their version from
          # the workspace Cargo version via `dynamic = ["version"]`. Assert none
          # reintroduced a hardcoded literal that would drift from the source.
          for pyproject in \
            bindings/uni-db/pyproject.toml \
            bindings/uni-db-onnx/pyproject.toml \
            bindings/uni-db-cuda/pyproject.toml \
            bindings/uni-db-metal/pyproject.toml \
            bindings/uni-db-onnx-cuda/pyproject.toml \
            bindings/uni-db-onnx-metal/pyproject.toml; do
            if grep -qE '^version = ' "$pyproject"; then
              echo "Error: $pyproject hardcodes a version; use 'dynamic = [\"version\"]' so the single source ([workspace.package] version) is reused."
              exit 1
            fi
            echo "OK: $pyproject derives its version from the workspace"
          done

          # uni-pydantic is the deliberate exception: it's pure-Python
          # (hatchling), and its isolated build can't reliably read the
          # workspace Cargo.toml (it resolves a bogus version), so it CANNOT use
          # maturin's `dynamic = ["version"]`. It carries the one version literal
          # outside Cargo.toml. This workflow builds/publishes it, so assert that
          # literal stays in lock-step with the workspace version — do NOT demand
          # `dynamic` here (that would be the bug this comment guards against).
          PYDANTIC_VERSION=$(grep '^version = ' bindings/uni-pydantic/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$VERSION" != "$PYDANTIC_VERSION" ]; then
            echo "Error: bindings/uni-pydantic/pyproject.toml version ($PYDANTIC_VERSION) does not match the workspace version ($VERSION)"
            exit 1
          fi
          echo "OK: bindings/uni-pydantic/pyproject.toml literal matches the workspace at $VERSION"

      # Single source of truth for where wheels get published. Every PyPI /
      # TestPyPI publish job below gates on this output; on a `none` target the
      # build + GitHub-Release-attach jobs still run, but nothing is pushed to
      # an index.
      - name: Resolve publish target
        id: resolve-target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
          else
            # Default publish target for tag-push releases. PyPI is now the
            # primary install channel: the per-project file-size-limit increases
            # have been granted for all six uni-db* projects, so the wheels
            # (which exceed the 100 MB default) can be uploaded. Tag-push builds
            # the matrix, publishes it to PyPI, and ALSO attaches it to the
            # GitHub Release (see attach-to-release) as a fallback channel.
            TARGET="pypi"
          fi
          echo "publish_target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Resolved publish target: $TARGET"

  # CPU-only Linux wheels: the default-everything `uni-db` and the slim
  # ONNX-only `uni-db-onnx`. CUDA-equipped variants live in dedicated jobs
  # below to isolate the CUDA toolchain dependency.
  build-linux:
    name: Build ${{ matrix.variant }} Linux wheels (${{ matrix.target }})
    needs: [validate]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        variant: [uni-db, uni-db-onnx]
        target: [x86_64, aarch64]
        include:
          - target: x86_64
            runner: ubuntu-latest
          - target: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bootstrap variant Python sources
        if: matrix.variant != 'uni-db'
        shell: bash
        run: ./scripts/bootstrap-wheel-variants.sh

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # .cargo/config.toml sets -fuse-ld=mold for Linux, but mold is not
          # available inside the manylinux container — clear it here.
          RUSTFLAGS: ""
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/${{ matrix.variant }}/Cargo.toml
          manylinux: 2_28
          before-script-linux: |
            yum install -y openssl-devel unzip
            PROTOC_VERSION="28.3"
            if [ "$(uname -m)" = "aarch64" ]; then
              PROTOC_ARCH="linux-aarch_64"
            else
              PROTOC_ARCH="linux-x86_64"
            fi
            curl -sSLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip"
            unzip -q "protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip" -d /usr/local
            rm "protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-linux-${{ matrix.target }}
          path: dist

  build-macos:
    name: Build ${{ matrix.variant }} macOS wheels (${{ matrix.target }})
    needs: [validate]
    runs-on: macos-latest-large
    strategy:
      fail-fast: false
      matrix:
        variant: [uni-db, uni-db-onnx]
        # Apple Silicon only. ort (ONNX Runtime) ships no prebuilt binary for
        # x86_64-apple-darwin, so Intel-macOS wheels can't link the onnx
        # provider. Intel Macs are EOL and the metal variants are already
        # aarch64-only — drop x86_64 rather than build ORT from source.
        target: [aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install protobuf
        run: brew install protobuf

      - name: Bootstrap variant Python sources
        if: matrix.variant != 'uni-db'
        shell: bash
        run: ./scripts/bootstrap-wheel-variants.sh

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}-apple-darwin
          args: --release --out dist -m bindings/${{ matrix.variant }}/Cargo.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-macos-${{ matrix.target }}
          path: dist

  # macOS arm64 builds with Apple-platform GPU acceleration. xervo 0.9.0's
  # `gpu-metal` activates candle/mistralrs Metal kernels (compiled to
  # `.metallib` and baked into the binary) AND `ort?/coreml` so ORT models
  # accelerate via the CoreML execution provider. The CoreML EP is
  # statically linked into pyke's macOS bundle — no sidecar `.dylib` ships
  # in the wheel.
  #
  # Apple Silicon only — macOS x86_64 isn't a target because the
  # Metal/CoreML stacks aren't worth supporting separately for retired
  # Intel Macs.
  build-metal:
    name: Build ${{ matrix.variant }} macOS wheels (aarch64)
    needs: [validate]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [uni-db-metal, uni-db-onnx-metal]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install protobuf
        run: brew install protobuf

      - name: Bootstrap variant Python sources
        shell: bash
        run: ./scripts/bootstrap-wheel-variants.sh

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64-apple-darwin
          args: --release --strip --out dist -m bindings/${{ matrix.variant }}/Cargo.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-macos-aarch64
          path: dist

  build-windows:
    name: Build ${{ matrix.variant }} Windows wheels (x86_64)
    needs: [validate]
    runs-on: windows-latest-l
    strategy:
      fail-fast: false
      matrix:
        variant: [uni-db, uni-db-onnx]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install protobuf
        run: choco install protoc

      - name: Bootstrap variant Python sources
        if: matrix.variant != 'uni-db'
        shell: bash
        run: ./scripts/bootstrap-wheel-variants.sh

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist -m bindings/${{ matrix.variant }}/Cargo.toml

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-windows-x86_64
          path: dist

  # CUDA-equipped Linux builds for the slim variant. `uni-db-onnx-cuda`
  # doesn't need nvcc — pyke's `ort/download-binaries` fetches a prebuilt
  # CUDA EP sidecar (`libonnxruntime_providers_cuda.so` ~180 MB) at Rust
  # build time, and the slim variant has no candle/mistralrs CUDA kernels.
  # Uses the same manylinux_2_28 container as `build-linux`.
  #
  # The default-everything `uni-db-cuda` variant pulls candle/mistralrs in
  # too — its kernels need nvcc, so it builds in `build-cuda-toolkit-linux`
  # (manylinux_2_34 + CUDA toolkit) below.
  build-cuda-linux:
    name: Build ${{ matrix.variant }} Linux wheels (x86_64, CUDA)
    needs: [validate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [uni-db-onnx-cuda]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bootstrap variant Python sources
        shell: bash
        run: ./scripts/bootstrap-wheel-variants.sh

      # We build with `--auditwheel skip` because auditwheel's default repair
      # bundles every NEEDED shared library into the wheel, including the
      # CUDA driver lib (`libcuda.so.1`) and CUDA runtime/math libs
      # (`libcudart`, `libcublas`, `libcublasLt`, `libcurand`, `libnvrtc`,
      # plus `libcudnn` once it's in the picture). Those are *host-supplied*
      # — bundling them produces 620+ MB wheels that exceed PyPI's per-file
      # limit and risk runtime conflicts with the user's NVIDIA driver
      # install. The post-build repair step below excludes them.
      - name: Build wheels (skip auditwheel)
        uses: PyO3/maturin-action@v1
        env:
          RUSTFLAGS: ""
        with:
          target: x86_64
          args: --release --strip --auditwheel skip --out dist-raw -m bindings/${{ matrix.variant }}/Cargo.toml
          manylinux: 2_28
          before-script-linux: |
            yum install -y openssl-devel unzip
            # Stage OpenSSL 1.1 libs for the host-side auditwheel repair. The
            # ORT CUDA EP links libcrypto.so.1.1, but the repair runs on the
            # ubuntu host runner (OpenSSL 3 only) and can't locate it to bundle.
            # The workspace is bind-mounted, so libs copied here reach the host.
            mkdir -p "$GITHUB_WORKSPACE/_cudahostlibs"
            cp -av /usr/lib64/libcrypto.so.1.1* /usr/lib64/libssl.so.1.1* "$GITHUB_WORKSPACE/_cudahostlibs/" 2>/dev/null || true
            PROTOC_VERSION="28.3"
            curl -sSLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
            unzip -q "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local
            rm "protoc-${PROTOC_VERSION}-linux-x86_64.zip"

      - name: Repair wheel with CUDA host-lib excludes
        run: |
          set -euo pipefail
          pip install auditwheel patchelf
          mkdir -p dist
          # Let auditwheel find the OpenSSL 1.1 libs staged from the build
          # container so it can bundle libcrypto/libssl (the host has only
          # OpenSSL 3). CUDA driver/runtime libs stay excluded below.
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/_cudahostlibs:${LD_LIBRARY_PATH:-}"
          # CUDA driver, runtime, and math libs are host-supplied via the
          # user's NVIDIA driver / CUDA toolkit install. cuDNN is also
          # host-supplied (see uni-xervo build.rs warning). Exclude all of
          # them from the wheel so they're left as runtime-resolved
          # NEEDED entries rather than bundled.
          for whl in dist-raw/*.whl; do
            auditwheel repair \
              --plat manylinux_2_28_x86_64 \
              --wheel-dir dist \
              --exclude 'libcuda.so.*' \
              --exclude 'libcudart.so.*' \
              --exclude 'libcublas.so.*' \
              --exclude 'libcublasLt.so.*' \
              --exclude 'libcurand.so.*' \
              --exclude 'libcudnn.so.*' \
              --exclude 'libnvrtc.so.*' \
              --exclude 'libnvJitLink.so.*' \
              "$whl"
          done
          ls -lh dist/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-linux-x86_64
          path: dist

  # CUDA Linux builds that need `nvcc` (candle/mistralrs per-SM PTX
  # compilation). Used by `uni-db-cuda` (default-everything + CUDA), which
  # bundles candle/mistralrs alongside the ORT CUDA path.
  #
  # Uses manylinux_2_34 (AlmaLinux 9 base) instead of manylinux_2_28
  # because the CUDA 13.0 toolkit is published as RHEL/AlmaLinux 9 RPMs
  # by NVIDIA. Trade-off: marginally narrower runtime compatibility
  # (excludes EL8 / Ubuntu 18.04-class hosts), but those Linux distros
  # are EOL and unlikely to have driver 580+ anyway.
  #
  # `before-script-linux` adds NVIDIA's CUDA repo and installs the
  # toolkit into `/usr/local/cuda-13.0/`; the `bin` dir is exported via
  # `export PATH=...`, which propagates to the maturin step inside the
  # same container session.
  build-cuda-toolkit-linux:
    name: Build ${{ matrix.variant }} Linux wheels (x86_64, CUDA toolkit)
    needs: [validate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [uni-db-cuda]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bootstrap variant Python sources
        shell: bash
        run: ./scripts/bootstrap-wheel-variants.sh

      - name: Build wheels (skip auditwheel)
        uses: PyO3/maturin-action@v1
        env:
          # Statically link the C++ runtime. The manylinux_2_34 image's default
          # gcc-toolset-14 emits libstdc++ symbols (GLIBCXX_3.4.30+ / CXXABI_1.3.14+)
          # newer than the manylinux_2_34 auditwheel policy allows (<= 3.4.29), and
          # the nvcc/CUDA host-link path bypasses the toolset's static-"nonshared"
          # trick — so `auditwheel repair` fails with "too-recent versioned symbols".
          # Embedding libstdc++/libgcc keeps those symbols internal, so the wheel
          # stays manylinux_2_34-compliant (glibc itself is fine at 2.34). Setting
          # RUSTFLAGS here also overrides .cargo/config.toml's mold linker, which
          # isn't available inside the manylinux container.
          #
          # NOTE: this step-level env is belt-and-suspenders only. maturin-action
          # did NOT reliably propagate it into the containerized cargo build (the
          # flag was silently dropped → auditwheel still saw gcc-14 symbols and
          # failed). The authoritative export is in before-script-linux below,
          # which runs inside the container in the same session as the build —
          # the same mechanism that makes CUDA_COMPUTE_CAP take effect.
          RUSTFLAGS: "-Clink-arg=-static-libstdc++ -Clink-arg=-static-libgcc"
          # candle/mistralrs CUDA kernels auto-detect the GPU compute
          # capability via nvidia-smi, which doesn't exist on GPU-less build
          # runners. Pin the target arch explicitly (SM 8.0 / Ampere). PTX is
          # forward-compatible, so SM80 runs on Ampere through Hopper/Blackwell
          # via driver JIT. No GPU is needed to build — only the toolkit (nvcc),
          # which is installed below. Also exported in before-script-linux,
          # which runs inside the manylinux container.
          CUDA_COMPUTE_CAP: "80"
        with:
          target: x86_64
          args: --release --strip --auditwheel skip --out dist-raw -m bindings/${{ matrix.variant }}/Cargo.toml
          manylinux: 2_34
          before-script-linux: |
            set -euxo pipefail
            dnf install -y openssl-devel unzip dnf-plugins-core
            PROTOC_VERSION="28.3"
            curl -sSLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
            unzip -q "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local
            rm "protoc-${PROTOC_VERSION}-linux-x86_64.zip"
            # Install CUDA 13.0 toolkit from NVIDIA's RHEL 9 repo. AlmaLinux 9
            # is binary-compatible with RHEL 9.
            dnf config-manager --add-repo https://developer.download.nvidia.com/compute/cuda/repos/rhel9/x86_64/cuda-rhel9.repo
            dnf install -y cuda-toolkit-13-0
            export PATH="/usr/local/cuda-13.0/bin:$PATH"
            export CUDA_HOME="/usr/local/cuda-13.0"
            # No live GPU in the build container — pin the compute capability
            # so candle/mistralrs don't try to probe nvidia-smi (see step env).
            export CUDA_COMPUTE_CAP=80
            # Export RUSTFLAGS HERE, not only in the step `env:`. maturin-action
            # does not reliably forward step-level RUSTFLAGS into the
            # containerized cargo build (the static-libstdc++ flag was silently
            # dropped, so auditwheel still saw too-recent gcc-14 GLIBCXX
            # symbols). before-script exports DO reach the build in the same
            # container session — same mechanism that makes CUDA_COMPUTE_CAP work.
            export RUSTFLAGS="-Clink-arg=-static-libstdc++ -Clink-arg=-static-libgcc"
            echo "RUSTFLAGS in build container: ${RUSTFLAGS}"
            nvcc --version
            # CRITICAL: stage this container's glibc-2.34 OpenSSL 3 for the repair.
            # The `auditwheel repair` step runs on the HOST runner (Ubuntu, glibc
            # 2.39), NOT in this container. auditwheel BUNDLES the wheel's
            # non-excluded deps — libssl.so.3 / libcrypto.so.3 — by resolving them
            # on the host, where OpenSSL 3 carries GLIBC_2.38 symbols that bust the
            # manylinux_2_34 policy ("too-recent versioned symbols"). The CUDA .so
            # itself is fully compliant (GLIBC<=2.34); the violation is injected at
            # bundle time by host OpenSSL. Copy the container's glibc-2.34 OpenSSL 3
            # to a workspace dir; the repair step puts it first on LD_LIBRARY_PATH
            # so auditwheel bundles THOSE. Same pattern the onnx-cuda job uses for
            # OpenSSL 1.1. Verified locally: without this the repair fails with the
            # exact CI error; with it the wheel relabels to manylinux_2_34.
            mkdir -p "$GITHUB_WORKSPACE/_cudahostlibs"
            cp -av /usr/lib64/libssl.so.3* /usr/lib64/libcrypto.so.3* "$GITHUB_WORKSPACE/_cudahostlibs/" 2>/dev/null || true

      - name: Repair wheel with CUDA host-lib excludes
        run: |
          set -euo pipefail
          pip install auditwheel patchelf
          mkdir -p dist
          # Resolve libssl.so.3 / libcrypto.so.3 against the container's
          # glibc-2.34 OpenSSL 3 (staged into _cudahostlibs by the build step),
          # NOT this host runner's glibc-2.39 OpenSSL 3 (which references
          # GLIBC_2.38 and would fail the manylinux_2_34 relabel). auditwheel
          # bundles whatever LD_LIBRARY_PATH resolves first. See the staging
          # rationale in the build step's before-script.
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/_cudahostlibs:${LD_LIBRARY_PATH:-}"
          # Same exclude list as `build-cuda-linux`. Note: candle's CUDA
          # path uses `cudarc` which dlopens libcudart at runtime; that's
          # host-supplied so we exclude it. cuBLAS/cuRAND are pulled in
          # transitively for matrix ops.
          # Authoritative pre-repair symbol audit. An earlier GLIBCXX-only audit
          # proved libstdc++ is already compliant (GLIBCXX_3.4.29) yet repair
          # still fails with "too-recent versioned symbols" — so the offender is
          # a DIFFERENT class we weren't printing. `auditwheel show` names the
          # exact library + the versioned symbols that constrain the platform
          # tag; that is the ground truth. We also print the max referenced
          # version per class against the manylinux_2_34 caps (GLIBC<=2.34,
          # GCC[libgcc_s]<=7.0.0, GLIBCXX<=3.4.29, CXXABI<=1.3.13) so the
          # offending class is obvious at a glance.
          for whl in dist-raw/*.whl; do
            echo "########## auditwheel show: $(basename "$whl") ##########"
            auditwheel show "$whl" || true
            tmp=$(mktemp -d)
            unzip -q "$whl" -d "$tmp"
            for so in $(find "$tmp" -name '*.so'); do
              echo "=== symbol audit: $(basename "$so") ==="
              echo "  NEEDED: $(readelf -d "$so" 2>/dev/null | sed -n 's/.*Shared library: \[\(.*\)\]/\1/p' | tr '\n' ' ')"
              for cls in GLIBC GLIBCXX CXXABI GCC; do
                printf '  max %-8s %s\n' "$cls" "$(readelf -sW "$so" 2>/dev/null | grep -oE "${cls}_[0-9.]+" | sort -V | tail -1 || echo none)"
              done
              # Full GLIBC ref list: any entry > 2.34 is the offender (the image
              # itself can't emit GCC>7.0.0 or GLIBC>2.34, so a >2.34 here must
              # come from a CUDA-toolkit-provided object, not the base toolchain).
              echo "  all GLIBC refs: $(readelf -sW "$so" 2>/dev/null | grep -oE 'GLIBC_[0-9.]+' | sort -Vu | tr '\n' ' ')"
            done
            rm -rf "$tmp"
          done
          for whl in dist-raw/*.whl; do
            auditwheel repair \
              --plat manylinux_2_34_x86_64 \
              --wheel-dir dist \
              --exclude 'libcuda.so.*' \
              --exclude 'libcudart.so.*' \
              --exclude 'libcublas.so.*' \
              --exclude 'libcublasLt.so.*' \
              --exclude 'libcurand.so.*' \
              --exclude 'libcudnn.so.*' \
              --exclude 'libnvrtc.so.*' \
              --exclude 'libnvJitLink.so.*' \
              "$whl"
          done
          ls -lh dist/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-linux-x86_64
          path: dist

  build-sdist:
    name: Build ${{ matrix.variant }} source distribution
    needs: [validate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [uni-db, uni-db-onnx, uni-db-cuda, uni-db-metal, uni-db-onnx-cuda, uni-db-onnx-metal]
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap variant Python sources
        if: matrix.variant != 'uni-db'
        shell: bash
        run: ./scripts/bootstrap-wheel-variants.sh

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m bindings/${{ matrix.variant }}/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-sdist
          path: dist

  publish-testpypi:
    name: Publish uni-db wheels to TestPyPI
    needs: [validate, build-linux, build-cuda-linux, build-cuda-toolkit-linux, build-macos, build-metal, build-windows, build-sdist]
    runs-on: ubuntu-latest
    environment: testpypi
    if: needs.validate.outputs.publish_target == 'testpypi'
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-uni-db-*
          path: dist
          merge-multiple: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to TestPyPI (dry run)
        if: inputs.dry_run == true
        run: uv publish --dry-run --publish-url https://test.pypi.org/legacy/ dist/*

      - name: Publish to TestPyPI
        if: inputs.dry_run != true
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: uv publish --check-url https://test.pypi.org/simple/ --publish-url https://test.pypi.org/legacy/ dist/*

  publish-pypi:
    name: Publish uni-db wheels to PyPI
    needs: [validate, build-linux, build-cuda-linux, build-cuda-toolkit-linux, build-macos, build-metal, build-windows, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    if: needs.validate.outputs.publish_target == 'pypi'
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-uni-db-*
          path: dist
          merge-multiple: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI (dry run)
        if: inputs.dry_run == true
        run: uv publish --dry-run dist/*

      - name: Publish to PyPI
        if: inputs.dry_run != true
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --check-url https://pypi.org/simple/ dist/*

  # Attach the built wheels (+ sdists) to the GitHub Release as assets. This is
  # an install channel that is NOT subject to PyPI's 100 MB per-file limit
  # (release assets allow up to 2 GB/file), so it works even before/without the
  # PyPI file-size-limit increases. Users install via:
  #   pip install https://github.com/<owner>/uni-db/releases/download/<tag>/<wheel>
  # `release.yml` owns release creation + notes; this job only uploads assets.
  attach-to-release:
    name: Attach wheels to GitHub Release
    needs: [build-linux, build-cuda-linux, build-cuda-toolkit-linux, build-macos, build-metal, build-windows, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only on a real version-tag release (the same trigger under which
    # release.yml creates the GitHub Release). Skipped for workflow_dispatch.
    if: github.event_name == 'push'
    steps:
      - name: Download all wheels and sdists
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-uni-db-*
          path: dist
          merge-multiple: true

      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # release.yml's create-release runs in parallel on this same tag, but
          # only waits on validate+create-tag (~2 min) while this job waits on
          # the ~45-min build matrix — so the release is normally present long
          # before we get here. Wait as a safety net, then upload.
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              break
            fi
            echo "Release $TAG not present yet (attempt $i/30); waiting 20s..."
            sleep 20
          done
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "ERROR: release $TAG never appeared; cannot attach wheels."
            exit 1
          fi
          echo "Attaching $(find dist -type f | wc -l) files to release $TAG:"
          ls -lh dist
          gh release upload "$TAG" dist/* --repo "$REPO" --clobber

  # uni-pydantic build + publish. Lives here (not in release.yml) because it
  # depends on the uni-db *wheel* being on the index. `needs:` the wheel publish
  # jobs so it can't start until the uni-db wheel is actually published — an
  # in-workflow dependency that replaces the old cross-workflow PyPI polling.
  build-pydantic:
    name: Build uni-pydantic
    needs: [validate, publish-pypi, publish-testpypi]
    runs-on: ubuntu-latest
    # The two wheel-publish jobs are mutually exclusive (pypi on push /
    # target=pypi, testpypi on target=testpypi), so `always()` + gate on
    # whichever one ran succeeding.
    if: |
      always() && inputs.dry_run != true && needs.validate.result == 'success'
      && (needs.publish-pypi.result == 'success' || needs.publish-testpypi.result == 'success')
    env:
      # Mirrors the resolved publish target. build-pydantic only runs when a
      # uni-db wheel publish job succeeded, so the target is 'pypi' or
      # 'testpypi' here, never 'none'.
      REGISTRY: ${{ needs.validate.outputs.publish_target == 'testpypi' && 'testpypi' || 'pypi' }}
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Create virtualenv
        run: uv venv --python 3.12

      - name: Install published uni-db (with retry)
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if [ "$REGISTRY" == "testpypi" ]; then
            INDEX_ARGS="--index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/"
          else
            INDEX_ARGS=""
          fi
          # The uni-db wheel is already published (this job `needs:` the publish
          # job), so we only wait on PyPI's brief upload->index propagation lag,
          # not the multi-platform wheel build. A short retry suffices.
          ATTEMPTS=10
          for i in $(seq 1 "$ATTEMPTS"); do
            uv pip install $INDEX_ARGS "uni-db==${VERSION}" && break
            if [ "$i" -eq "$ATTEMPTS" ]; then
              echo "uni-db==${VERSION} not visible on ${REGISTRY} after ${ATTEMPTS} attempts despite a successful publish job — check index status."
              exit 1
            fi
            echo "uni-db==${VERSION} not yet on ${REGISTRY} (attempt ${i}/${ATTEMPTS}), retrying in 30s..."
            sleep 30
          done

      - name: Build uni-pydantic package
        run: uv build bindings/uni-pydantic

      - name: Smoke test with published uni-db
        run: |
          if [ "$REGISTRY" == "testpypi" ]; then
            INDEX_ARGS="--index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/"
          else
            INDEX_ARGS=""
          fi
          # Install with deps so runtime requirements (e.g. pydantic) are present.
          uv pip install $INDEX_ARGS --force-reinstall bindings/uni-pydantic/dist/*.whl
          uv run python - <<'PY'
          import uni_db
          import uni_pydantic
          print('uni_db:', getattr(uni_db, '__version__', 'unknown'))
          print('uni_pydantic:', getattr(uni_pydantic, '__version__', 'unknown'))
          PY

      - name: Upload pydantic dist
        uses: actions/upload-artifact@v4
        with:
          name: pydantic-dist
          path: bindings/uni-pydantic/dist

  publish-pydantic-testpypi:
    name: Publish uni-pydantic to TestPyPI
    needs: [validate, build-pydantic]
    runs-on: ubuntu-latest
    environment: testpypi
    if: |
      needs.build-pydantic.result == 'success'
      && needs.validate.outputs.publish_target == 'testpypi'
    steps:
      - name: Download pydantic dist
        uses: actions/download-artifact@v4
        with:
          name: pydantic-dist
          path: dist

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: uv publish --check-url https://test.pypi.org/simple/ --publish-url https://test.pypi.org/legacy/ dist/*

  publish-pydantic-pypi:
    name: Publish uni-pydantic to PyPI
    needs: [validate, build-pydantic]
    runs-on: ubuntu-latest
    environment: pypi
    if: |
      needs.build-pydantic.result == 'success'
      && needs.validate.outputs.publish_target == 'pypi'
    steps:
      - name: Download pydantic dist
        uses: actions/download-artifact@v4
        with:
          name: pydantic-dist
          path: dist

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --check-url https://pypi.org/simple/ dist/*
