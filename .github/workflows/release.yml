name: Release

# Owns the crates.io side of a release:
#   - version/CI validation
#   - tag creation
#   - GitHub release notes
#   - crates.io publish (Rust crates)
#
# The Python side — the uni-db wheel matrix AND the uni-pydantic build/publish
# — lives in `release-wheels.yml`, which runs in parallel on the same triggers.
# uni-pydantic depends on the uni-db *wheel* (PyPI), not the crate, and now
# uses an in-workflow `needs:` dependency on the wheel publish there instead of
# polling across workflows.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0). Required for manual dispatch.'
        required: true
        type: string
      dry_run:
        description: 'Build and validate without publishing, creating tags, or GitHub releases'
        type: boolean
        default: false
      target:
        description: 'Publish target (ignored for dry_run)'
        type: choice
        options: [pypi, testpypi]
        default: testpypi
      create_tag:
        description: 'Create and push git tag (manual dispatch only)'
        type: boolean
        default: true
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    if: github.repository == 'rustic-ai/uni-db'
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check version consistency across all wheel-matrix pyprojects
        env:
          VERSION: ${{ steps.set-version.outputs.version }}
        run: |
          set -euo pipefail

          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Input version ($VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          # The maturin wheels single-source their version from the workspace
          # Cargo version via `dynamic = ["version"]` (maturin reads the crate's
          # Cargo.toml). Assert none reintroduced a hardcoded literal that would
          # silently drift from the single source.
          for pyproject in \
            bindings/uni-db/pyproject.toml \
            bindings/uni-db-onnx/pyproject.toml \
            bindings/uni-db-cuda/pyproject.toml \
            bindings/uni-db-metal/pyproject.toml \
            bindings/uni-db-onnx-cuda/pyproject.toml \
            bindings/uni-db-onnx-metal/pyproject.toml; do
            if grep -qE '^version = ' "$pyproject"; then
              echo "Error: $pyproject hardcodes a version; use 'dynamic = [\"version\"]' so the single source ([workspace.package] version) is reused."
              exit 1
            fi
            echo "OK: $pyproject derives its version from the workspace"
          done

          # uni-pydantic is pure-Python (hatchling); it carries the one version
          # literal outside Cargo.toml. Assert it stays in lock-step.
          PYDANTIC_VERSION=$(grep '^version = ' bindings/uni-pydantic/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$VERSION" != "$PYDANTIC_VERSION" ]; then
            echo "Error: bindings/uni-pydantic/pyproject.toml version ($PYDANTIC_VERSION) does not match the workspace version ($VERSION)"
            exit 1
          fi

          echo "All versions consistent at: $VERSION"

      - name: Assert CI passed
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for commit $SHA"
          CONCLUSION=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
            --jq '[.check_runs[] | select(.name == "Test")] | .[0].conclusion // "not_found"')
          echo "CI 'Test' conclusion: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "ERROR: CI check 'Test' did not pass (conclusion: $CONCLUSION). Aborting release."
            exit 1
          fi

  create-tag:
    name: Create Tag
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.repository == 'rustic-ai/uni-db' && github.event_name == 'workflow_dispatch' && inputs.create_tag == true && inputs.dry_run != true
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        env:
          VERSION: v${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

  create-release:
    name: Create GitHub Release
    needs: [validate, create-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.repository == 'rustic-ai/uni-db' && always() && inputs.dry_run != true && needs.validate.result == 'success' && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Release v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}

  publish-rust:
    if: github.repository == 'rustic-ai/uni-db'
    name: Publish to crates.io
    needs: [validate]
    runs-on: linux-xlarge-32
    environment: crates-io
    # The new-crate rate-limit backoff below can wait out several 10-min
    # windows on a first-publish of many new crates. Allow the full GitHub
    # default so the job isn't cut off mid-wait.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold libssl-dev unzip
          PROTOC_VERSION="28.3"
          curl -sSLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local
          rm "protoc-${PROTOC_VERSION}-linux-x86_64.zip"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Validate packaging (leaf crates only)
        run: |
          # uni-btic has no workspace dependencies — validate it first.
          # uni-common depends on uni-btic, so it can only be validated after
          # uni-btic is published (skip here, validated during publish step).
          cargo package -p uni-btic --allow-dirty --no-verify

      - name: Publish to crates.io (dry run)
        if: inputs.dry_run == true
        run: cargo publish -p uni-btic --dry-run --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.UNI_CRATES_IO }}

      - name: Publish to crates.io
        if: inputs.dry_run != true
        run: |
          publish_crate() {
            local crate=$1
            local attempt=0
            local max_attempts=20
            local output retry_at now wait_until wait
            while :; do
              if output=$(cargo publish -p "$crate" 2>&1); then
                echo "$output"
                return 0
              fi
              echo "$output"
              # Idempotent: a version already on the index is fine (re-run / a
              # sibling crate already pushed it). Skip and continue.
              if echo "$output" | grep -q "already exists"; then
                echo "Skipping $crate: already published"
                return 0
              fi
              # crates.io new-crate rate limit: burst of 5, then 1 per 10 min.
              # The 2.0 release first-publishes ~14 new crates, so it trips the
              # limit. cargo does not back off on 429 itself
              # (rust-lang/cargo#13530), so wait out the window the server tells
              # us ("Please try again after <RFC-2822 date>") and retry the same
              # crate. Fall back to ~11 min if the timestamp can't be parsed.
              if echo "$output" | grep -qiE "status 429|Too Many Requests|rate limit"; then
                attempt=$((attempt + 1))
                if [ "$attempt" -gt "$max_attempts" ]; then
                  echo "ERROR: $crate still rate-limited after $max_attempts attempts; aborting."
                  return 1
                fi
                retry_at=$(echo "$output" | sed -n 's/.*[Pp]lease try again after \(.*\) and see.*/\1/p' | head -1)
                now=$(date -u +%s)
                wait_until=$(date -u -d "$retry_at" +%s 2>/dev/null || echo 0)
                wait=$(( wait_until - now + 15 ))
                if [ "$wait" -lt 30 ] || [ "$wait" -gt 3600 ]; then
                  wait=660
                fi
                echo "Rate limited on $crate (attempt $attempt/$max_attempts); waiting ${wait}s for the crates.io new-crate window..."
                sleep "$wait"
                continue
              fi
              # Any other failure is fatal.
              return 1
            done
          }
          # Crates are published in dependency (topological) order: a crate may
          # only be published after every workspace crate it depends on is on
          # crates.io. This list is uni-db's full publishable dependency closure
          # (normal + build deps; dev-deps are stripped by `cargo publish`).
          # Keep it in sync when adding/removing workspace dependencies — a
          # missing entry fails the release with "no matching package named ...".
          publish_crate uni-btic
          sleep 30
          publish_crate uni-sparse-vector
          sleep 30
          publish_crate uni-common
          sleep 30
          publish_crate uni-cypher
          sleep 30
          publish_crate uni-locy
          sleep 30
          publish_crate uni-plugin
          sleep 30
          publish_crate uni-plugin-apoc-core
          sleep 30
          # Versioned dev-dependency of uni-plugin-pyo3 and uni-plugin-wasm:
          # `cargo publish` keeps versioned dev-deps in the manifest, so it must
          # be on crates.io before those two crates can be packaged.
          publish_crate uni-plugin-conformance
          sleep 30
          publish_crate uni-plugin-pyo3
          sleep 30
          publish_crate uni-plugin-rhai
          sleep 30
          publish_crate uni-plugin-wasm-rt
          sleep 30
          publish_crate uni-sidecar
          sleep 30
          publish_crate uni-crdt
          sleep 30
          publish_crate uni-plugin-custom
          sleep 30
          publish_crate uni-plugin-extism
          sleep 30
          publish_crate uni-plugin-wasm
          sleep 30
          publish_crate uni-store
          sleep 30
          publish_crate uni-algo
          sleep 30
          publish_crate uni-plugin-builtin
          sleep 30
          publish_crate uni-query-functions
          sleep 30
          publish_crate uni-query
          sleep 30
          publish_crate uni-fork
          sleep 30
          publish_crate uni-plugin-host
          sleep 30
          publish_crate uni-bulk
          sleep 30
          publish_crate uni-db
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.UNI_CRATES_IO }}
