name: Release

# Owns the non-wheel parts of a release:
#   - version/CI validation
#   - tag creation
#   - GitHub release notes
#   - crates.io publish (Rust crates)
#   - uni-pydantic build + publish (depends on uni-db being on PyPI)
#
# Wheel build + publish lives in `release-wheels.yml`, which runs in parallel
# on the same triggers. `build-pydantic` below polls PyPI for the published
# `uni-db` version, so it doesn't need a job-graph dependency on the wheels
# workflow — it just retries until the wheel lands on the index.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0). Required for manual dispatch.'
        required: true
        type: string
      dry_run:
        description: 'Build and validate without publishing, creating tags, or GitHub releases'
        type: boolean
        default: false
      target:
        description: 'Publish target (ignored for dry_run)'
        type: choice
        options: [pypi, testpypi]
        default: testpypi
      create_tag:
        description: 'Create and push git tag (manual dispatch only)'
        type: boolean
        default: true
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check version consistency across all wheel-matrix pyprojects
        env:
          VERSION: ${{ steps.set-version.outputs.version }}
        run: |
          set -euo pipefail

          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Input version ($VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          # Every wheel-matrix sibling pyproject + uni-pydantic shares the
          # same lock-step version. Keep this list in sync with workspace
          # members under `bindings/uni-db*/`. The wheel build workflow
          # (`release-wheels.yml`) runs the same check independently.
          for pyproject in \
            bindings/uni-db/pyproject.toml \
            bindings/uni-db-onnx/pyproject.toml \
            bindings/uni-db-onnx-cuda/pyproject.toml \
            bindings/uni-db-onnx-metal/pyproject.toml \
            bindings/uni-db-fastembed/pyproject.toml \
            bindings/uni-db-fastembed-cuda/pyproject.toml \
            bindings/uni-db-fastembed-metal/pyproject.toml \
            bindings/uni-db-mistralrs/pyproject.toml \
            bindings/uni-db-mistralrs-cuda/pyproject.toml \
            bindings/uni-db-mistralrs-metal/pyproject.toml \
            bindings/uni-db-all/pyproject.toml \
            bindings/uni-db-all-cuda/pyproject.toml \
            bindings/uni-db-all-metal/pyproject.toml \
            bindings/uni-pydantic/pyproject.toml; do
            PYPI_VERSION=$(grep '^version' "$pyproject" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "$VERSION" != "$PYPI_VERSION" ]; then
              echo "Error: Input version ($VERSION) does not match $pyproject ($PYPI_VERSION)"
              exit 1
            fi
            echo "OK: $pyproject = $PYPI_VERSION"
          done

          echo "All versions match: $VERSION"

      - name: Assert CI passed
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          echo "Checking CI status for commit $SHA"
          CONCLUSION=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
            --jq '[.check_runs[] | select(.name == "Test")] | .[0].conclusion // "not_found"')
          echo "CI 'Test' conclusion: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "ERROR: CI check 'Test' did not pass (conclusion: $CONCLUSION). Aborting release."
            exit 1
          fi

  create-tag:
    name: Create Tag
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' && inputs.create_tag == true && inputs.dry_run != true
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        env:
          VERSION: v${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

  create-release:
    name: Create GitHub Release
    needs: [validate, create-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always() && inputs.dry_run != true && needs.validate.result == 'success' && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Release v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}

  publish-rust:
    name: Publish to crates.io
    needs: [validate]
    runs-on: linux-xlarge-32
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mold libssl-dev unzip
          PROTOC_VERSION="28.3"
          curl -sSLO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -q "protoc-${PROTOC_VERSION}-linux-x86_64.zip" -d /usr/local
          rm "protoc-${PROTOC_VERSION}-linux-x86_64.zip"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Validate packaging (leaf crates only)
        run: |
          # uni-btic has no workspace dependencies — validate it first.
          # uni-common depends on uni-btic, so it can only be validated after
          # uni-btic is published (skip here, validated during publish step).
          cargo package -p uni-btic --allow-dirty --no-verify

      - name: Publish to crates.io (dry run)
        if: inputs.dry_run == true
        run: cargo publish -p uni-btic --dry-run --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.UNI_CRATES_IO }}

      - name: Publish to crates.io
        if: inputs.dry_run != true
        run: |
          publish_crate() {
            local crate=$1
            local output
            output=$(cargo publish -p "$crate" 2>&1) && echo "$output" && return 0
            echo "$output"
            echo "$output" | grep -q "already exists" && echo "Skipping $crate: already published" && return 0
            return 1
          }
          publish_crate uni-btic
          sleep 30
          publish_crate uni-common
          sleep 30
          publish_crate uni-crdt
          sleep 30
          publish_crate uni-cypher
          sleep 30
          publish_crate uni-store
          sleep 30
          publish_crate uni-algo
          sleep 30
          publish_crate uni-locy
          sleep 30
          publish_crate uni-query
          sleep 30
          publish_crate uni-db
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.UNI_CRATES_IO }}

  build-pydantic:
    name: Build uni-pydantic
    needs: [validate]
    runs-on: ubuntu-latest
    # Wheels are published by `release-wheels.yml` running in parallel.
    # `build-pydantic` waits for the wheel to land on PyPI/TestPyPI via the
    # retry loop in the install step below, rather than via a job-graph
    # dependency on the other workflow.
    if: |
      always() && inputs.dry_run != true && needs.validate.result == 'success'
      && (
        github.event_name == 'push'
        || (github.event_name == 'workflow_dispatch' && (inputs.target == 'pypi' || inputs.target == 'testpypi'))
      )
    env:
      # `push` events (tag) always go to pypi. `workflow_dispatch` honors the
      # `target` input. Mirrors the same logic in `release-wheels.yml`.
      REGISTRY: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && 'testpypi' || 'pypi' }}
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'

      - name: Create virtualenv
        run: uv venv --python 3.12

      - name: Install published uni-db (with retry)
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if [ "$REGISTRY" == "testpypi" ]; then
            INDEX_ARGS="--index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/"
          else
            INDEX_ARGS=""
          fi
          for i in 1 2 3 4 5; do
            uv pip install $INDEX_ARGS "uni-db==${VERSION}" && break
            if [ "$i" -eq 5 ]; then
              echo "Failed to install uni-db==${VERSION} from ${REGISTRY} after retries"
              exit 1
            fi
            echo "uni-db not yet available on ${REGISTRY}, retrying in 30s..."
            sleep 30
          done

      - name: Build uni-pydantic package
        run: uv build bindings/uni-pydantic

      - name: Smoke test with published uni-db
        run: |
          if [ "$REGISTRY" == "testpypi" ]; then
            INDEX_ARGS="--index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/"
          else
            INDEX_ARGS=""
          fi
          # Install with deps so runtime requirements (e.g. pydantic) are present.
          uv pip install $INDEX_ARGS --force-reinstall bindings/uni-pydantic/dist/*.whl
          uv run python - <<'PY'
          import uni_db
          import uni_pydantic
          print('uni_db:', getattr(uni_db, '__version__', 'unknown'))
          print('uni_pydantic:', getattr(uni_pydantic, '__version__', 'unknown'))
          PY

      - name: Upload pydantic dist
        uses: actions/upload-artifact@v4
        with:
          name: pydantic-dist
          path: bindings/uni-pydantic/dist

  publish-pydantic-testpypi:
    name: Publish uni-pydantic to TestPyPI
    needs: [build-pydantic]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    # Mirrors the testpypi gate from `release-wheels.yml`'s `publish-testpypi`.
    if: |
      needs.build-pydantic.result == 'success'
      && github.event_name == 'workflow_dispatch'
      && inputs.target == 'testpypi'
    steps:
      - name: Download pydantic dist
        uses: actions/download-artifact@v4
        with:
          name: pydantic-dist
          path: dist

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to TestPyPI
        run: uv publish --trusted-publishing always --check-url https://test.pypi.org/simple/ --publish-url https://test.pypi.org/legacy/ dist/*

  publish-pydantic-pypi:
    name: Publish uni-pydantic to PyPI
    needs: [build-pydantic]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    # Mirrors the pypi gate from `release-wheels.yml`'s `publish-pypi`.
    if: |
      needs.build-pydantic.result == 'success'
      && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi'))
    steps:
      - name: Download pydantic dist
        uses: actions/download-artifact@v4
        with:
          name: pydantic-dist
          path: dist

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist/*
