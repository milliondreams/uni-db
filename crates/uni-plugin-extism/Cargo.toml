[package]
name = "uni-plugin-extism"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Extism (bytes-in/bytes-out WASM) loader for the uni-db plugin framework"
keywords = ["plugin", "wasm", "extism", "graph", "database"]
categories = ["database", "wasm"]

[dependencies]
uni-plugin = { workspace = true }
uni-plugin-wasm-rt = { workspace = true }
arrow = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
datafusion = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
futures = { workspace = true }

# extism-sdk is the heaviest dep; gated behind the `extism-runtime` feature
# so embedders that only want the trait surface (e.g., for compile-time
# Rust-only plugins) can opt out.
#
# VERSION SYNC: extism pins a specific wasmtime major (1.30 → wasmtime 43).
# Keep wasmtime/wasmtime-wasi in crates/uni-plugin-wasm on that same major —
# a mismatch links two wasmtime copies into every uni-db binary. When bumping
# extism, bump uni-plugin-wasm's wasmtime to extism's wasmtime major in the
# same change.
extism = { version = "1", optional = true }

[features]
default = ["extism-runtime"]
extism-runtime = ["dep:extism"]
# Turns on real OTel trace-context extraction in `uni-plugin` so the host-fn
# dispatch injects a live W3C `traceparent`; gates the positive injection test
# (`host_svc::net::tests::dispatch_injects_active_traceparent`). Default-off.
otel = ["uni-plugin/otel"]

[dev-dependencies]
tokio = { workspace = true }
# `wat` assembles minimal valid WASM from text for instantiation tests
# without committing binary fixtures.
wat = "1"
# For the `otel`-gated positive injection test: a real (no-exporter) tracer
# provider + the tracing-opentelemetry layer. Dev-only.
opentelemetry = { workspace = true }
opentelemetry_sdk = "0.32"
tracing-opentelemetry = { workspace = true }
tracing-subscriber = { workspace = true }
