[package]
name = "uni-query"
description = "OpenCypher query parser, planner, and vectorized executor for Uni"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
uni-common = { workspace = true }
uni-btic = { workspace = true }
uni-store = { workspace = true }
uni-algo = { workspace = true }
uni-xervo = { workspace = true }
uni-crdt = { workspace = true }
uni-cypher = { workspace = true }
uni-locy = { workspace = true }
uni-query-functions = { workspace = true }
uni-plugin = { workspace = true }
# Layering note: uni-query depends on uni-plugin-builtin so the M3
# `MonotonicAggState` retrofit can dispatch through `Arc<dyn LocyAggregate>`
# trait objects sourced from the 9 built-in aggregates (MIN/MAX/SUM/MSUM/
# COUNT/AVG/COLLECT/MNOR/MPROD). Pragmatic inversion of the expected
# "builtin sits above query" direction; once `MonotonicAggState` receives
# its trait objects from planning time (resolved via the framework
# `PluginRegistry`) instead of constructing them lazily, this dep can move.
uni-plugin-builtin = { workspace = true }
tokio = { workspace = true }
object_store = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
log = { workspace = true }
arrow = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
arrow-row = { workspace = true }
smol_str = { version = "0.3", features = ["serde"] }
regex = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
parking_lot = { workspace = true }
metrics = { workspace = true }
csv = { workspace = true }
parquet = { workspace = true }
rand = { workspace = true }
base64 = "0.21"
datafusion = { workspace = true }
bitvec = "1"
fxhash = { workspace = true }
biodivine-lib-bdd = { workspace = true }
tokio-util = { workspace = true }

[features]
default = []
# L0 snapshot-isolation reads (Component C1). Gates the executor's pinned-read
# path (`Executor::read_snapshot` + the `get_context` hook); forwards to
# `uni-store/l0-snapshot`. Default-off.
l0-snapshot = ["uni-store/l0-snapshot"]
# Optimistic concurrency control. Gates SSI read-set capture on the traversal
# path (`GraphExecutionContext::record_neighbor_reads`); forwards to
# `uni-store/ssi` and enables `l0-snapshot`. Default-off; see
# docs/proposals/serializable_snapshot_isolation.md.
ssi = ["uni-store/ssi", "l0-snapshot"]

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }
