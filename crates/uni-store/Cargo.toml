[package]
name = "uni-store"
description = "Storage layer for Uni graph database - Lance datasets, LSM deltas, and WAL"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["lance-backend"]
lance-backend = ["dep:lance", "dep:lancedb", "dep:lance-index", "dep:lance-linalg"]
# Prototype: strategy-D (epoch/generation pinning) snapshot-isolation reads.
# Default-off; gates `L0Manager::snapshot_isolated` and its test. See
# `docs/proposals/serializable_snapshot_isolation.md` §4 (Component C1).
l0-snapshot = []

[dependencies]
uni-common = { workspace = true }
uni-btic = { workspace = true }
uni-crdt = { workspace = true }
# M10 follow-up: PropertyManager's CRDT merge funnel consults
# `Crdt::merge_via_registry`, which requires a `PluginRegistry`
# handle. uni-plugin → uni-store is a one-way edge (uni-plugin does
# not depend on uni-store), so no cycle.
uni-plugin = { path = "../uni-plugin", version = "1.8" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
log = { workspace = true }
arrow = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
parking_lot = { workspace = true }
bytes = { workspace = true }
async-trait = { workspace = true }
tempfile = { workspace = true }
lru = "0.16"
metrics = { workspace = true }
tokio = { workspace = true, features = ["full"] }
futures = "0.3"
lance = { workspace = true, optional = true }
lance-index = { version = "3.0.1", optional = true }
lance-linalg = { version = "3.0.1", optional = true }
lancedb = { workspace = true, optional = true }
dashmap = "6.0"
arc-swap = { workspace = true }
uni-xervo = { workspace = true }

object_store = { workspace = true }
url = { workspace = true }
sha3 = "0.10.8"
tokio-util = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
proptest = { workspace = true }
