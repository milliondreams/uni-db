[package]
name = "uni-db"
description = "Embedded graph database with OpenCypher queries, vector search, and columnar storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "README.md"

[dependencies]
uni-common = { workspace = true }
uni-store = { workspace = true }
uni-algo = { workspace = true }
uni-query = { workspace = true }
uni-query-functions = { workspace = true }
uni-crdt = { workspace = true }
uni-bulk = { workspace = true }
uni-fork = { workspace = true }
# `local_dynamic_tls`: mimalloc's C lib defaults to the initial-exec TLS
# model, which requires static-TLS surplus reserved at program startup.
# That surplus is tiny and unavailable when `uni-db` is built as a
# `dlopen`-loaded cdylib (the `bindings/uni-db` Python extension sets
# `MiMalloc` as its `#[global_allocator]`), so loading fails with
# "cannot allocate memory in static TLS block". The local-dynamic model
# resolves TLS at access time and loads cleanly under dlopen.
mimalloc = { version = "0.1", default-features = false, features = ["local_dynamic_tls"], optional = true }
uni-plugin = { workspace = true }
uni-plugin-host = { workspace = true }
uni-plugin-builtin = { workspace = true }
uni-plugin-apoc-core = { workspace = true, optional = true }
uni-plugin-custom = { workspace = true }
# Optional Extism (bytes-in/bytes-out WASM) loader. Behind the
# `extism-plugins` feature so the routine `Uni` build doesn't pay the
# wasmtime+extism compile cost.
uni-plugin-extism = { workspace = true, optional = true }
# Optional Component Model (typed WIT contracts) loader. Behind
# `wasm-plugins` so the routine build doesn't pay the wasmtime cost.
uni-plugin-wasm = { workspace = true, optional = true }
# Rhai (host-embedded scripting) loader. Pure Rust, no C toolchain or
# WASM wrapper, so it's part of the default feature set — unlike the
# WASM loaders which gate their wasmtime weight behind opt-in features.
uni-plugin-rhai = { workspace = true, optional = true }
# PyO3 (live Python callables) loader. Off by default — pulls in
# libpython linkage on the host. Embedders building Python extensions
# (e.g. `bindings/uni-db`) enable this via the `pyo3-plugins` feature.
uni-plugin-pyo3 = { workspace = true, optional = true, features = ["pyo3"] }
# We do NOT inherit the workspace `pyo3` features list — the workspace
# enables `extension-module` (correct for `bindings/uni-db`, which is
# loaded by Python and must not link libpython itself). For standalone
# `cargo test -p uni-db --features pyo3-plugins` we want libpython
# linked, which requires omitting `extension-module` and adding
# `auto-initialize`. When `bindings/uni-db` builds this crate with
# `pyo3-plugins` enabled, Cargo unifies features — bindings still
# applies `extension-module` from its own pyo3 dep, and
# `auto-initialize` becomes a no-op there.
pyo3 = { version = "0.27", optional = true, features = ["abi3-py310", "auto-initialize"] }
tokio = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
log = { workspace = true }
metrics = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
arrow-ipc = "57.2.0"
serde_bytes = "0.11"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
uuid = { workspace = true }
object_store = { workspace = true }
url = { workspace = true }
chrono = { workspace = true }
uni-xervo = { workspace = true }
uni-cypher = { workspace = true }
uni-locy = { workspace = true }
async-trait = { workspace = true }
parking_lot = { workspace = true }
datafusion = { workspace = true }
tokio-util = { workspace = true }
scopeguard = "1"
tempfile = { workspace = true }
dashmap = "6.0"
smol_str = "0.3"
# M11: OpenTelemetry layer for the `observability` module. Embedders
# opt in via `crate::observability::init_otel_subscriber(...)`; nothing
# is auto-installed (would conflict with embedders' own subscribers).
tracing-subscriber = { workspace = true }
tracing-opentelemetry = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["grpc-tonic"] }
# Jittered backoff for `Session::transact_with_retry` (api/retry.rs).
rand = { workspace = true }
# Note: uni-db has no direct ort / tokenizers / hf-hub / ndarray consumers
# after the LocalOnnxRerankerProvider hoist into uni-xervo (0.5.2). All ONNX
# access flows through uni-xervo's provider facades.

[dev-dependencies]
criterion = "0.5"
mimalloc = { version = "0.1", default-features = false }
rand = { workspace = true }
arrow = { workspace = true }
lance = { workspace = true }
lancedb = { workspace = true }
parquet = { workspace = true }
csv = { workspace = true }
env_logger = { workspace = true }
tracing-subscriber = { workspace = true }
# Test-only: hooks_bridge_test.rs constructs `SmolStr` keys for the
# phased `ParseContext::with_params` builder (M5e v1.1 ABI surface).
smol_str = "0.3"
# Dev-only: structural-sharing map for the L0 snapshot strategy bench. Not a
# production dependency until the benchmark decision selects strategy B.
imbl = "3"
# Capture emitted `metrics` counters in-process so SSI resilience/stress tests
# can assert on freeze/abort/conflict telemetry. Pairs with `metrics = "0.22"`.
metrics-util = "0.16"
# Configure the commit-path `fail_point!` markers from crash-recovery tests
# (`fail::cfg` / `FailScenario`). Only has effect under `--features failpoints`.
fail = "0.5"
# Randomized workload generation for the SSI invariant-oracle + chaos tests.
proptest = { workspace = true }

[[bench]]
name = "algo_benchmarks"
harness = false

[[bench]]
name = "comprehensive"
harness = false

[[bench]]
name = "micro_benchmarks"
harness = false

[[bench]]
name = "mutation_benchmarks"
harness = false

[[bench]]
name = "fork_diff_promote"
harness = false

[[bench]]
