harness = false

[[bench]]
name = "ssi_commit_overhead"
harness = false

[[bench]]
name = "ssi_freeze"
harness = false

[[bench]]
name = "ssi_contention"
harness = false

[features]
default = [
    "lance-backend",
    "apoc-core",
    "rhai-plugins",
    "provider-candle",
    "provider-mistralrs",
    "provider-onnx",
    "provider-openai",
    "provider-gemini",
    "provider-vertexai",
    "provider-mistral",
    "provider-anthropic",
    "provider-voyageai",
    "provider-cohere",
    "provider-azure-openai",
]
lance-backend = ["uni-store/lance-backend"]
# APOC-equivalent built-in procedures and scalar functions implemented in
# Rust (apoc.bitwise.*, future apoc.text/coll/math/refactor/schema/atomic).
# Default-on. Library embedders who don't want APOC content disable it.
apoc-core = ["dep:uni-plugin-apoc-core"]
# Enables `Uni::load_wasm_extism` — load Extism-shaped WASM plugins at
# runtime. Pulls in `wasmtime` + `extism-sdk`; off by default.
extism-plugins = ["dep:uni-plugin-extism"]
# Enables `Uni::load_wasm_component` — load Component Model WASM
# plugins at runtime. Pulls in wasmtime 41 + cranelift; off by default.
wasm-plugins = ["dep:uni-plugin-wasm"]
# Enables `Uni::load_rhai_plugin` — load Rhai-script plugins at runtime.
# Rhai is pure-Rust, no C toolchain or WASM wrapper; on by default.
rhai-plugins = ["dep:uni-plugin-rhai"]
# Enables `Uni::load_python_plugin` — load PyO3 live-callable plugins at
# runtime. Off by default because it pulls in libpython. Embedders
# building Python extensions enable this transitively; standalone Rust
# embedders typically leave it off.
pyo3-plugins = ["dep:uni-plugin-pyo3", "dep:pyo3"]
snapshot-internals = []
storage-internals = []
# NOTE: SSI/OCC is always compiled and toggled at runtime via
# `UniConfig::ssi_enabled` (default `true`); it is no longer a cargo feature.
# Forwards commit-path fault injection (uni-store `fail_point!` markers) so the
# crash-recovery resilience tests can simulate a crash at a precise point.
# Test-only.
failpoints = ["uni-store/failpoints"]
provider-candle = ["uni-xervo/provider-candle"]
provider-mistralrs = ["uni-xervo/provider-mistralrs"]
provider-openai = ["uni-xervo/provider-openai"]
provider-gemini = ["uni-xervo/provider-gemini"]
provider-vertexai = ["uni-xervo/provider-vertexai"]
provider-mistral = ["uni-xervo/provider-mistral"]
provider-anthropic = ["uni-xervo/provider-anthropic"]
provider-voyageai = ["uni-xervo/provider-voyageai"]
provider-cohere = ["uni-xervo/provider-cohere"]
provider-azure-openai = ["uni-xervo/provider-azure-openai"]
# ONNX + GPU surface — mirrors uni-xervo's 0.9.0 three-axis model
# (provider × linking × acceleration). See
# `../../../uni-xervo/docs/migrations/0.9.0-feature-surface.md`. The
# previous 9-feature gpu-* surface (gpu-tensorrt, gpu-coreml, gpu-rocm,
# gpu-directml, gpu-openvino, gpu-qnn, gpu-wgpu) is retired — those EPs
# remain reachable via `provider-onnx-dynamic` + `ORT_DYLIB_PATH`. The
# native ONNX Embed task on local/onnx (xervo 0.8.0) replaces the retired
# provider-fastembed; FastEmbed alias strings still work unchanged.
provider-onnx = ["uni-xervo/provider-onnx"]
provider-onnx-dynamic = ["uni-xervo/provider-onnx-dynamic"]
gpu-cuda = ["uni-xervo/gpu-cuda"]
gpu-metal = ["uni-xervo/gpu-metal"]

# Re-export mimalloc so consumers can opt in to the fast allocator without
# adding a separate dep:
#
#   [dependencies]
#   uni-db = { version = "...", features = ["mimalloc"] }
#
#   // in main.rs:
#   #[global_allocator]
#   static GLOBAL: uni_db::MiMalloc = uni_db::MiMalloc;
#
# Measured ~3x throughput on heavily-allocating workloads (e.g. many small
# CREATE statements). See benches/concurrent_mutations.rs for the gate.
mimalloc = ["dep:mimalloc"]
