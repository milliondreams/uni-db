[package]
name = "uni-db"
description = "Embedded graph database with OpenCypher queries, vector search, and columnar storage"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "README.md"

[dependencies]
uni-common = { workspace = true }
uni-store = { workspace = true }
uni-algo = { workspace = true }
uni-query = { workspace = true }
uni-crdt = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
log = { workspace = true }
metrics = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
uuid = { workspace = true }
object_store = { workspace = true }
url = { workspace = true }
chrono = { workspace = true }
uni-xervo = { workspace = true }
uni-cypher = { workspace = true }
uni-locy = { workspace = true }
async-trait = { workspace = true }
parking_lot = { workspace = true }
datafusion = { workspace = true }
tokio-util = { workspace = true }
scopeguard = "1"
tempfile = { workspace = true }
dashmap = "6.0"
# Note: uni-db has no direct ort / tokenizers / hf-hub / ndarray consumers
# after the LocalOnnxRerankerProvider hoist into uni-xervo (0.5.2). All ONNX
# access flows through uni-xervo's provider facades.

[dev-dependencies]
criterion = "0.5"
rand = { workspace = true }
arrow = { workspace = true }
lance = { workspace = true }
lancedb = { workspace = true }
parquet = { workspace = true }
csv = { workspace = true }
env_logger = { workspace = true }
tracing-subscriber = { workspace = true }

[[bench]]
name = "algo_benchmarks"
harness = false

[[bench]]
name = "comprehensive"
harness = false

[[bench]]
name = "micro_benchmarks"
harness = false

[[bench]]
name = "mutation_benchmarks"
harness = false

[[bench]]
name = "fork_diff_promote"
harness = false

[[bench]]
name = "concurrent_mutations"
harness = false

[features]
default = [
    "lance-backend",
    "provider-candle",
    "provider-mistralrs",
    "provider-onnx",
    "provider-openai",
    "provider-gemini",
    "provider-vertexai",
    "provider-mistral",
    "provider-anthropic",
    "provider-voyageai",
    "provider-cohere",
    "provider-azure-openai",
]
lance-backend = ["uni-store/lance-backend"]
snapshot-internals = []
storage-internals = []
provider-candle = ["uni-xervo/provider-candle"]
provider-mistralrs = ["uni-xervo/provider-mistralrs"]
provider-openai = ["uni-xervo/provider-openai"]
provider-gemini = ["uni-xervo/provider-gemini"]
provider-vertexai = ["uni-xervo/provider-vertexai"]
provider-mistral = ["uni-xervo/provider-mistral"]
provider-anthropic = ["uni-xervo/provider-anthropic"]
provider-voyageai = ["uni-xervo/provider-voyageai"]
provider-cohere = ["uni-xervo/provider-cohere"]
provider-azure-openai = ["uni-xervo/provider-azure-openai"]
# ONNX + GPU surface — mirrors uni-xervo's 0.9.0 three-axis model
# (provider × linking × acceleration). See
# `../../../uni-xervo/docs/migrations/0.9.0-feature-surface.md`. The
# previous 9-feature gpu-* surface (gpu-tensorrt, gpu-coreml, gpu-rocm,
# gpu-directml, gpu-openvino, gpu-qnn, gpu-wgpu) is retired — those EPs
# remain reachable via `provider-onnx-dynamic` + `ORT_DYLIB_PATH`. The
# native ONNX Embed task on local/onnx (xervo 0.8.0) replaces the retired
# provider-fastembed; FastEmbed alias strings still work unchanged.
provider-onnx = ["uni-xervo/provider-onnx"]
provider-onnx-dynamic = ["uni-xervo/provider-onnx-dynamic"]
gpu-cuda = ["uni-xervo/gpu-cuda"]
gpu-metal = ["uni-xervo/gpu-metal"]
