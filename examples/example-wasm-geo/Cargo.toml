# Standalone example Component Model plugin — NOT a workspace member.
#
# Build:
#   cd examples/example-wasm-geo
#   cargo build --target wasm32-wasip2 --release
#
# Produces target/wasm32-wasip2/release/example_wasm_geo.wasm (a
# wasm32 module). The test harness in
# `crates/uni-plugin-wasm/tests/example_wasm_geo_e2e.rs` wraps it
# into a Component Model binary on-the-fly via the `wit-component`
# crate — no external `wasm-tools` install required.

[workspace]

[package]
name = "example-wasm-geo"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Example Component Model plugin: geo.haversine with full Arrow-IPC invoke"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.51"
# Arrow IPC on wasm32-wasip2. Same feature trim as the extism
# example (no chrono / csv / json).
arrow = { version = "57", default-features = false, features = ["ipc"] }
arrow-array = "57"
arrow-schema = "57"

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1
debug = false
