# Standalone example Component Model plugin — NOT a workspace member.
#
# Build:
#   cd examples/example-wasm-graph
#   cargo build --target wasm32-wasip2 --release
#
# Produces target/wasm32-wasip2/release/example_wasm_graph.wasm.
#
# A GraphCompute guest algorithm: Personalized PageRank driven through the
# imported `host-graph` interface (one JSON kernel call per op). Load with a
# CapabilitySet granting `graph-compute` + `host-query` and a session registry
# wired via `WasmLoader::with_graph`.
[workspace]

[package]
name = "example-wasm-graph"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Example Component Model plugin: Personalized PageRank via host-graph"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "0.51"
serde_json = "1"

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1
debug = false
