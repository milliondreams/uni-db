# M11 FU-3 — end-to-end OTel propagation demo.
#
# Build:
#   cd examples/otel-demo
#   cargo run
#
# Demonstrates: a `tracing::info_span!` wraps a query, the query's
# Rust body calls `http_get_with_traceparent` against a local
# capture server, and the server-side print of the received
# `traceparent` header shares its `trace_id` with the outer span.
#
# This crate declares `[workspace] = {}` so it opts out of the
# outer uni workspace.

[workspace]

[package]
name = "otel-demo"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[dependencies]
uni-db = { path = "../../crates/uni" }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "time"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
tracing-opentelemetry = "0.28"
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["trace"] }
