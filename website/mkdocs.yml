theme:
  icon:
    repo: fontawesome/brands/github
  # favicon: assets/images/favicon.png
  # logo: assets/images/logo.svg
  palette:
    primary: custom
  features:
    - content.tabs.link

extra_css:
  - assets/stylesheets/theme.css

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
